      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: notifications.fetch
      tags: [Api20100401CallNotification]
      summary: Fetch an account notification (compat stub)
      description: Always 404 — VoiceML does not persist notifications.
      responses:
        '200':
          description: Notification resource (unused — stub always 404s today).
          content:
            application/json:
              schema:
                type: object
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Events.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: callEvents.list
      tags: [Api20100401Call]
      summary: List per-call lifecycle events (compat stub)
      description: |
        Twilio's fine-grained per-call event stream. VoiceML
        delivers equivalent data via `StatusCallback` (initiated /
        ringing / answered / completed); this endpoint is mounted
        as a stub returning an empty list so SDK helpers iterate
        cleanly. The canonical event source is the customer's
        `StatusCallback` URL. Page/PageSize are accepted for SDK
        ergonomics but have no effect on an empty list.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Empty list (always — stub).
          content:
            application/json:
              schema:
                type: object
                required: [events, page, page_size, total, uri]
                properties:
                  events:    { type: array, items: {} }
                  page:      { type: integer, enum: [0] }
                  page_size: { type: integer }
                  total:     { type: integer, enum: [0] }
                  uri:       { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/UserDefinedMessages.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    post:
      operationId: userDefinedMessages.create
      tags: [Api20100401Call]
      summary: Send a user-defined message on a live call (NOT IMPLEMENTED)
      description: |
        Twilio's chat-style messages on a live call. Real
        message-passing infrastructure (a websocket on the
        customer-facing leg) that's out of scope for VoiceML.
        Returns 501 with Twilio code 20501. The empty request body
        schema is declared so codegen tooling emits a method
        signature consistent with Twilio's SDK.
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
      responses:
        '201':
          description: |
            Twilio declares 201 Created on success. VoiceML returns 501
            Not Implemented — both are declared for SDK codegen compatibility.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '501':
          description: Not implemented.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Conferences/{ConferenceSid}/Recordings.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ConferenceSid'
    get:
      operationId: conferenceRecordings.list
      tags: [Api20100401ConferenceRecording]
      summary: List recordings captured by a conference
      description: |
        Returns recordings created by `<Dial><Conference record="record-from-start">`
        verbs that ran in this conference. Pagination envelope same as
        `/Recordings`.
      parameters:
        - { name: DateCreated,  in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created on this UTC date (YYYY-MM-DD)." }
        - { name: "DateCreated<", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly before this UTC date." }
        - { name: "DateCreated>", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly after this UTC date." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of conference-scoped recordings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecordingList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: conferenceRecordings.create
      tags: [Api20100401ConferenceRecording]
      summary: Start a recording on a live conference
      description: |
        Begins a recording on the named conference's mixed audio. The new
        Recording resource is returned with `source` =
        `StartConferenceRecordingAPI` and `status` = `in-progress`.
        Conference recordings are always mono (`channels` = 1).
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                RecordingStatusCallback:       { type: string }
                RecordingStatusCallbackMethod: { type: string, default: "POST" }
                RecordingStatusCallbackEvent:  { type: string, description: "Comma-separated: in-progress,completed,absent" }
      responses:
        '200':
          description: Recording started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '201':
          description: |
            Recording started (Twilio-historical 201 Created). VoiceML
            returns 200 OK exclusively; this code is declared so the
            spec matches twilio-oai's documented response set verbatim
            and SDK codegen produces the same response-handling switch.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '404':
          description: Conference not found or not active.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Recording subsystem not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Conferences/{ConferenceSid}/Recordings/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ConferenceSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: conferenceRecordings.fetch
      tags: [Api20100401ConferenceRecording]
      summary: Fetch a conference-scoped recording
      description: |
        Same JSON resource as `/Recordings/{RecordingSid}` but enforces
        the conference scope from the URL path. 404 if the recording exists
        but is attached to a different conference.
      responses:
        '200':
          description: Recording metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: conferenceRecordings.update
      tags: [Api20100401ConferenceRecording]
      summary: Update a conference-scoped recording's status
      description: |
        Same semantics as `/Calls/{CallSid}/Recordings/{Sid}` but enforces
        conference scope from the URL path.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Status]
              properties:
                Status:
                  type: string
                  enum: [stopped, paused, in-progress]
      responses:
        '200':
          description: Recording resource (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      operationId: conferenceRecordings.delete
      tags: [Api20100401ConferenceRecording]
      summary: Delete a conference-scoped recording
      description: |
        Same semantics as `/Recordings/{Sid}` but enforces conference
        scope from the URL path.
      responses:
        '204': { description: Recording deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Recordings/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: callRecordings.fetch
      tags: [Api20100401CallRecording]
      summary: Fetch recording metadata for a specific call (call-scoped form)
      description: |
        Same JSON resource as `/Recordings/{RecordingSid}` but enforces
        the call-scope from the URL path. 404 if the recording exists
        but is attached to a different call.
      responses:
        '200':
          description: Recording metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: callRecordings.update
      tags: [Api20100401CallRecording]
      summary: Update a mid-call recording's status
      description: |
        Applies stop / pause / resume on the live recording.
        All three transitions return 200 + the post-mutation
        Recording resource. Tenant-scoped: a RecordingSid that
        belongs to a different account returns 404 without leaking
        existence.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Status]
              properties:
                Status:
                  type: string
                  enum: [stopped, paused, in-progress]
      responses:
        '200':
          description: Recording resource (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '400':
          description: Pause / resume failed against the live call.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '408':
          description: |
            Twilio returns 408 Request Timeout when the recording is locked.
            VoiceML uses 503/409 instead — both are declared for SDK compatibility.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      operationId: callRecordings.delete
      tags: [Api20100401CallRecording]
      summary: Delete a recording (row + local WAV + S3 object when present)
      description: |
        Removes the memdb row, unlinks the on-disk WAV, and (when
        `RECORDING_S3_BUCKET` is configured) issues an S3 DeleteObject
        on the archived copy. S3 deletion is best-effort: failure logs
        but does not fail the API call (the bucket lifecycle policy is
        the long-stop cleanup). Tenant-scoped — cross-tenant DELETE
        returns 404 without affecting the row.
      responses:
        '204': { description: Recording deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Recordings/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: recordings.fetch
      tags: [Api20100401Recording]
      summary: Fetch recording metadata
      description: |
        Returns JSON metadata for the recording. The companion
        `.wav` path returns the audio bytes (or a 302/410 redirect
        depending on archival state); see `recordings.fetchAudio`.

        Tenant-scoped: a RecordingSid that belongs to a different
        account returns `404` with the same shape as a nonexistent
        sid — no enumeration leak.

        See [docs/aws-recordings.md](https://github.com/voicetel/callBroadcast/blob/main/docs/aws-recordings.md)
        for the archival pipeline.
      parameters:
        - name: IncludeSoftDeleted
          in: query
          required: false
          schema: { type: boolean }
          description: |
            Twilio-compatible parameter. VoiceML hard-deletes recordings —
            accepted but does not change fetch behaviour.
      responses:
        '200':
          description: Recording metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      operationId: recordings.delete
      tags: [Api20100401Recording]
      summary: Delete a recording (row + local WAV + S3 object when present)
      description: |
        Removes the memdb row, unlinks the on-disk WAV, and (when
        `RECORDING_S3_BUCKET` is configured) issues an S3 DeleteObject
        on the archived copy. S3 deletion is best-effort: failure logs
        but does not fail the API call (the bucket lifecycle policy is
        the long-stop cleanup). Tenant-scoped — cross-tenant DELETE
        returns 404 without affecting the row.
      responses:
        '204': { description: Recording deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Recordings/{Sid}.wav:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: recordings.fetchAudio
      tags: [Api20100401Recording]
      summary: Fetch recording audio (WAV)
      description: |
        Returns the captured audio as `audio/wav` with one of three
        delivery shapes:

          * `200 OK` — local file present (typical for the first
            `RECORDING_LOCAL_GRACE` window after the call ends).
          * `302 Found` — local file cleaned up but archived to S3;
            `Location` header points at a presigned URL with TTL
            `RECORDING_PRESIGN_TTL`.
          * `410 Gone` — local file gone AND no `s3_key` set
            (typically: archival not configured + cleanup ran, or
            archival failed and the WAV was lost).

        Tenant-scoped: a RecordingSid that belongs to a different
        account returns `404` with the same shape as a nonexistent
        sid — no enumeration leak.

        See [docs/aws-recordings.md](https://github.com/voicetel/callBroadcast/blob/main/docs/aws-recordings.md)
        for the archival pipeline.
      responses:
        '200':
          description: Recording audio.
          content:
            audio/wav: {}
        '302':
          description: WAV archived to S3; `Location` is a presigned URL.
          headers:
            Location:
              schema: { type: string }
              description: Presigned S3 URL with `RECORDING_PRESIGN_TTL` lifetime.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410':
          description: Recording audio is no longer available (no local file, no S3 key).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /health:
    get:
      operationId: health.check
      tags: [Diagnostic]
      summary: Deep liveness probe
      description: |
        Composite probe with two-tier severity. Hard checks (storage,
        disk free space, voice stack processes + required modules +
        SIP profile state) flip the LB-facing `ok` boolean. Soft
        checks (host CPU loadavg, memory pressure, workload percents,
        cluster health) surface in `warnings` only — the LB stays in
        rotation. Result cached 5 s on full success.
      security: []
      responses:
        '200':
          description: All Hard checks pass. `warnings` may still be populated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:       { type: boolean, enum: [true] }
                  warnings:
                    type: array
                    items: { $ref: '#/components/schemas/HealthFailure' }
        '503':
          description: One or more Hard checks failed. Body lists failures + any concurrent warnings.
          content:
            application/json:
              schema:
                type: object
                required: [ok, failures]
                properties:
                  ok:       { type: boolean, enum: [false] }
                  failures:
                    type: array
                    items: { $ref: '#/components/schemas/HealthFailure' }
                  warnings:
                    type: array
                    items: { $ref: '#/components/schemas/HealthFailure' }

  /openapi.yaml:
    get:
      operationId: openapi.yaml
      tags: [Diagnostic]
      summary: OpenAPI spec (YAML)
      security: []
      responses:
        '200':
          description: This document.
          content:
            application/yaml: {}

  /openapi.yml:
    get:
      operationId: openapi.yml
      tags: [Diagnostic]
      summary: OpenAPI spec (YAML, .yml alias)
      description: Alias for `/openapi.yaml`. Same response, same content type.
      security: []
      responses:
        '200':
          description: This document.
          content:
            application/yaml: {}

  /openapi.json:
    get:
      operationId: openapi.json
      tags: [Diagnostic]
      summary: OpenAPI spec (JSON)
      security: []
      responses:
        '200':
          description: This document, JSON-encoded.
          content:
            application/json: {}

  /2010-04-01/Accounts/{AccountSid}/IncomingPhoneNumbers.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: incomingPhoneNumbers.list
      tags: [Api20100401IncomingPhoneNumber]
      summary: List DIDs assigned to the authenticated tenant
      description: |
        Returns every DID currently bound to the authenticated
        account. Tenant-scoped — only the caller's own rows are
        returned; the global admin list endpoint is on the private
        listener and not described here.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: PhoneNumber
          in: query
          required: false
          description: |
            Exact-match filter on the E.164 phone number. Twilio's
            canonical lookup pattern is
            `GET /IncomingPhoneNumbers?PhoneNumber=+1...` followed by
            `GET /IncomingPhoneNumbers/{sid}` using the `sid` from the
            list result. Twilio-compatible SDK clients issue this
            pattern; the filter is supported so the same call pattern
            works against VoiceML. Returns a 0-or-1-row envelope.
          schema:
            type: string
            pattern: '^\+[1-9]\d{1,14}$'
        - name: FriendlyName
          in: query
          required: false
          schema: { type: string }
          description: |
            Twilio-compatible parameter. VoiceML doesn't model per-DID
            FriendlyName on phone_numbers (the field is empty in every
            view), so this parameter is accepted but does not narrow
            or widen the result set. Declared for SDK migration
            compatibility.
        - name: Beta
          in: query
          required: false
          schema: { type: boolean }
          description: |
            Twilio-compatible parameter. VoiceML does not model the
            carrier-supplied "beta" flag (no upstream beta-status
            distinction), so this parameter is accepted but does not
            narrow or widen the result set. Declared for SDK migration
            compatibility.
        - name: Origin
          in: query
          required: false
          schema: { type: string, enum: [twilio, hosted] }
          description: |
            Twilio-compatible parameter. VoiceML treats every assigned DID
            as locally provisioned (no twilio/hosted origin
            distinction), so this parameter is accepted but does not
            narrow or widen the result set. Declared for SDK migration
            compatibility.
      responses:
        '200':
          description: Page of incoming phone numbers.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IncomingPhoneNumberList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Phone-number store not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: incomingPhoneNumbers.create
      tags: [Api20100401IncomingPhoneNumber]
      summary: Assign a DID to the authenticated tenant
      description: |
        Tenant self-serve assignment of an E.164 DID. Idempotent on
        the same tenant — re-POSTing the same `PhoneNumber` rebinds
        its voice routing without erroring (matches Twilio's update
        semantics). Returns 409 when the number is already claimed
        by a different account.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [PhoneNumber]
              properties:
                PhoneNumber:         { type: string, description: "E.164 — leading `+`, 7-15 digits." }
                VoiceUrl:            { type: string, format: uri }
                VoiceMethod:         { type: string, enum: [GET, POST] }
                VoiceFallbackUrl:    { type: string, format: uri }
                VoiceFallbackMethod: { type: string, enum: [GET, POST] }
                SmsApplicationSid:   { type: string, description: "Bind to an Application (AP+32hex) for default outbound-SMS DLR (#450)." }
          application/json:
            schema:
              type: object
              required: [PhoneNumber]
              properties:
                PhoneNumber:         { type: string }
                VoiceUrl:            { type: string, format: uri }
                VoiceMethod:         { type: string, enum: [GET, POST] }
                VoiceFallbackUrl:    { type: string, format: uri }
                VoiceFallbackMethod: { type: string, enum: [GET, POST] }
                SmsApplicationSid:   { type: string }
      responses:
        '201':
          description: Newly assigned DID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IncomingPhoneNumber' }
        '200':
          description: Existing DID rebound to the same tenant (idempotent re-POST).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IncomingPhoneNumber' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: Phone number is already assigned to a different account.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Phone-number store not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/IncomingPhoneNumbers/Local.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: incomingPhoneNumbers.listLocal
      tags: [Api20100401IncomingPhoneNumber]
      summary: List local DIDs assigned to the authenticated tenant
      description: |
        Twilio type-specific list alias. Returns DIDs inferred as
        `local` (non-toll-free US numbers and all non-US numbers).
        Same pagination envelope as `/IncomingPhoneNumbers`.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: PhoneNumber
          in: query
          required: false
          schema:
            type: string
            pattern: '^\+[1-9]\d{1,14}$'
        - name: FriendlyName
          in: query
          required: false
          schema: { type: string }
        - name: Beta
          in: query
          required: false
          schema: { type: boolean }
        - name: Origin
          in: query
          required: false
          schema: { type: string, enum: [twilio, hosted] }
      responses:
        '200':
          description: Page of local incoming phone numbers.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IncomingPhoneNumberList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Phone-number store not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: incomingPhoneNumbers.createLocal
      tags: [Api20100401IncomingPhoneNumber]
      summary: Assign a local DID to the authenticated tenant
      description: |
        Twilio type-specific create alias — same semantics as
        `POST /IncomingPhoneNumbers`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [PhoneNumber]
              properties:
                PhoneNumber: { type: string }
                VoiceUrl: { type: string, format: uri }
                VoiceMethod: { type: string, enum: [GET, POST] }
      responses:
        '201':
          description: Newly assigned DID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IncomingPhoneNumber' }
        '200':
