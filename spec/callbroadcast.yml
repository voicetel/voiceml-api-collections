        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of registration-auth CredentialList mappings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SipCredentialListMappingList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/SIP/Domains/{DomainSid}/Auth/Registrations/CredentialListMappings/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/SipParentDomainSid'
      - $ref: '#/components/parameters/SipMappingListSid'
    get:
      operationId: sip_domain_auth_registrations_credential_list_mappings.fetch
      tags: [Api20100401SipDomainMapping]
      summary: Fetch a registration-auth CredentialList mapping on a SIP Domain
      responses:
        '200':
          description: Registration-auth CredentialList mapping (mapped-list shape).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SipDomainMapping' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      operationId: sip_domain_auth_registrations_credential_list_mappings.delete
      tags: [Api20100401SipDomainMapping]
      summary: Unmap a registration-auth CredentialList from a SIP Domain
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Messages.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    post:
      operationId: messages.create
      tags: [Api20100401Message]
      summary: Send an SMS or MMS
      description: |
        Sends `Body` to `To` via the configured SMS provider. When one
        or more `MediaUrl` values are supplied the message is an MMS,
        dispatched through the tenant's configured MMS provider (#473)
        and `Body` becomes optional. When the provider is not configured
        the row is still persisted with status=failed and
        error_code=21609 so the integrator can introspect the rejection
        through GET /Messages/{Sid}.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [To]
              properties:
                To:                  { type: string, description: "Destination phone number (E.164)." }
                From:                { type: string, description: "Source phone number; falls back to the tenant's configured default sender." }
                Body:                { type: string, description: "Message text. Required unless MediaUrl is supplied (MMS)." }
                MediaUrl:            { type: array, items: { type: string, format: uri }, description: "One or more media URLs to attach (#473). Repeatable; presence makes the message an MMS routed through the tenant's MMS provider." }
                MessagingServiceSid: { type: string, description: "Accepted for parity; not yet routed against." }
                StatusCallback:      { type: string, format: uri, description: "Per-message delivery-receipt (DLR) callback URL; overrides the Application-level default (#450)." }
                StatusCallbackMethod: { type: string, enum: [GET, POST], description: "HTTP method for the StatusCallback (#450)." }
      responses:
        '201':
          description: Message resource (status=sent or status=failed).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: "SMS gateway not configured (error_code 21609) or messages subsystem unavailable (20500)."
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    get:
      operationId: messages.list
      tags: [Api20100401Message]
      summary: List Messages for the account (paged, DateCreated DESC)
      parameters:
        - { name: To,        in: query, schema: { type: string } }
        - { name: From,      in: query, schema: { type: string } }
        - { name: DateSent,  in: query, schema: { type: string, format: date-time-rfc-2822 } }
        - { name: 'DateSent<', in: query, schema: { type: string, format: date-time-rfc-2822 } }
        - { name: 'DateSent>', in: query, schema: { type: string, format: date-time-rfc-2822 } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of Messages.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Messages/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: messages.fetch
      tags: [Api20100401Message]
      summary: Fetch a Message
      responses:
        '200':
          description: Message resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: messages.update
      tags: [Api20100401Message]
      summary: Update a Message (Body redaction; Status=canceled rejected)
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Body:   { type: string, description: "Pass empty string to redact. Non-empty Body is ignored — Twilio's documented redaction semantics." }
                Status: { type: string, enum: [canceled], description: "Returns 21610 — outbound SMS is fire-and-forget, no cancel path." }
      responses:
        '200':
          description: Message resource (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Cancellation not supported by the SMS provider.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      operationId: messages.delete
      tags: [Api20100401Message]
      summary: Delete a Message
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Messages/{MessageSid}/Media.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - { name: MessageSid, in: path, required: true, schema: { type: string }, description: "Parent Message SID." }
    get:
      operationId: media.list
      tags: [Api20100401Media]
      summary: List the Media items attached to a Message (paged)
      parameters:
        - { name: DateCreated,   in: query, schema: { type: string, format: date-time-rfc-2822 }, description: "Filter to media created on this date." }
        - { name: 'DateCreated<', in: query, schema: { type: string, format: date-time-rfc-2822 }, description: "Filter to media created before this date." }
        - { name: 'DateCreated>', in: query, schema: { type: string, format: date-time-rfc-2822 }, description: "Filter to media created after this date." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of Media items.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MediaList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Messages/{MessageSid}/Media/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - { name: MessageSid, in: path, required: true, schema: { type: string }, description: "Parent Message SID." }
      - { name: Sid, in: path, required: true, schema: { type: string, pattern: '^ME[0-9a-f]{32}$' }, description: "Media item SID." }
    get:
      operationId: media.fetch
      tags: [Api20100401Media]
      summary: Fetch a Media item
      description: |
        Returns the Media resource JSON by default. A request whose
        Accept header asks for the media bytes (e.g. `image/*`) receives
        a 302 redirect to a short-lived presigned URL for the stored
        bytes, or to the recorded external source URL when bytes are not
        stored locally (#473).
      responses:
        '200':
          description: Media resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Media' }
        '302':
          description: Redirect to the media bytes (presigned or source URL).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      operationId: media.delete
      tags: [Api20100401Media]
      summary: Delete a Media item
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{Sid}.json:
    parameters:
      # Twilio names this path param `Sid` (not `AccountSid`) on the
      # account fetch/update — see twilio-oai api.v2010.account. The value
      # is the AccountSid; the self-serve handler only ever resolves the
      # authenticated account's own record.
      - name: Sid
        in: path
        required: true
        description: Twilio-format AccountSid (`AC` + 32 hex characters).
        schema:
          type: string
          pattern: '^AC[0-9a-f]{32}$'
    get:
      operationId: accounts.fetch
      tags: [Api20100401Account]
      summary: Fetch the authenticated account
      description: |
        Returns the authenticated account in the Twilio Account shape
        (status/type/owner_account_sid/friendly_name/date_created/
        date_updated/uri/subresource_uris). The response ADDITIVELY embeds
        VoiceML extension keys (name, voice_url, tts_*, stt_*, aws_*,
        allow_cidr, created_at/updated_at). The account secret `auth_token`
        is never emitted on this surface; rotate it via
        `POST /Accounts/{Sid}/RotateKey`. Self-serve — an account may only
        read its own record.
      responses:
        '200':
          description: The Account resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: accounts.update
      tags: [Api20100401Account]
      summary: Update the authenticated account
      description: |
        Updates the authenticated account. Accepts form-encoded or JSON
        bodies; only the fields present in the request are changed
        (only-set-fields-touched). `FriendlyName` maps to the Twilio
        `friendly_name`; the remaining fields configure VoiceML voice
        routing, BYO STT/TTS, AWS recording storage, and the IP allow-list.
        Returns the post-update Account resource in the same Twilio shape as
        the fetch. Self-serve — an account may only update its own record.
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema: { $ref: '#/components/schemas/SelfAccountUpdate' }
          application/json:
            schema: { $ref: '#/components/schemas/SelfAccountUpdate' }
      responses:
        '200':
          description: The updated Account resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Account store not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Balance.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: balance.fetch
      tags: [Api20100401Balance]
      summary: Fetch the account balance
      description: |
        Returns the account's current balance. VoiceML is operator-billed —
        there is no per-tenant runtime balance ledger — so the balance is
        reported as a static zero in the account's currency. The response
        mirrors Twilio's Balance resource exactly.
      responses:
        '200':
          description: The account balance.
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_sid: { type: string, nullable: true, description: "The unique SID identifier of the Account." }
                  balance:     { type: string, nullable: true, description: "The balance of the Account, in units specified by the currency. VoiceML reports a static zero." }
                  currency:    { type: string, nullable: true, description: "The units of currency for the account balance." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Recordings.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: recordings.list
      tags: [Api20100401Recording]
      summary: List recordings for the account
      parameters:
        - { name: DateCreated,  in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created on this UTC date (YYYY-MM-DD)." }
        - { name: "DateCreated<", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly before this UTC date." }
        - { name: "DateCreated>", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly after this UTC date." }
        - { name: CallSid, in: query, schema: { type: string, pattern: "^CA[0-9a-fA-F]{32}$" }, description: "Filter to recordings whose CallSid equals this value." }
        - { name: ConferenceSid, in: query, schema: { type: string, pattern: "^CF[0-9a-fA-F]{32}$" }, description: "Filter to recordings whose ConferenceSid equals this value." }
        - name: IncludeSoftDeleted
          in: query
          required: false
          schema: { type: boolean }
          description: |
            Twilio-compatible parameter. VoiceML hard-deletes recordings —
            there is no soft-delete store — so this parameter is
            accepted but does not change the result set.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of recordings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecordingList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Exports.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: exports.list
      tags: [Diagnostic]
      summary: List available daily event-log archives (VoiceML extension)
      description: |
        VoiceML extension (not a Twilio resource). Lists the authenticated
        account's nightly event-log archives — calls, messages, recordings
        metadata, and payments — available for self-service download.
        Archives are produced once per day and retained for one year, after
        which an S3 lifecycle rule deletes them.
      responses:
        '200':
          description: The account's available archives, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [account_sid, exports, uri]
                properties:
                  account_sid: { type: string }
                  uri: { type: string }
                  exports:
                    type: array
                    items:
                      type: object
                      required: [date, size, uri]
                      properties:
                        date: { type: string, description: "Archive day (YYYY-MM-DD)." }
                        size: { type: integer, format: int64, description: "Archive size in bytes." }
                        uri:  { type: string, description: "Download path for this archive." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Exports/{Date}:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - { name: Date, in: path, required: true, schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }, description: "Archive day (YYYY-MM-DD)." }
    get:
      operationId: exports.download
      tags: [Diagnostic]
      summary: Download a daily event-log archive (VoiceML extension)
      description: |
        VoiceML extension (not a Twilio resource). Redirects (302) to a
        time-limited presigned URL for the account's archive on the given
        date.
      responses:
        '302':
          description: Redirect to a presigned download URL in the Location header.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Recordings.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: callRecordings.list
      tags: [Api20100401CallRecording]
      summary: List recordings for one call
      parameters:
        - { name: DateCreated,  in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created on this UTC date (YYYY-MM-DD)." }
        - { name: "DateCreated<", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly before this UTC date." }
        - { name: "DateCreated>", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly after this UTC date." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of recordings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecordingList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: callRecordings.create
      tags: [Api20100401CallRecording]
      summary: Start a recording mid-call
      description: |
        Begins a fresh recording on the live call leg. The new
        Recording resource is returned in the 201 response. Distinct
        from `Record=true` on `POST /Calls`, which captures from the
        start of the call.
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                RecordingMaxDuration:          { type: integer, description: "Cap recording length in seconds. 0 = no limit." }
                RecordingChannels:             { type: string, enum: [mono, dual], description: "`dual` is accepted but not honored — VoiceML records mono, so `Recording.channels` is always 1." }
                PlayBeep:                      { type: boolean, default: true, description: "Twilio-compatible; accepted but currently a no-op on this REST endpoint (the `<Record>` TwiML verb does honor it)." }
                RecordingStatusCallback:       { type: string }
                RecordingStatusCallbackMethod: { type: string, default: "POST" }
                RecordingStatusCallbackEvent:  { type: string, description: "Comma-separated: in-progress,completed,absent" }
      responses:
        '200':
          description: Recording started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '201':
          description: |
            Recording started (Twilio-historical 201 Created). VoiceML
            returns 200 OK exclusively; this code is declared so the
            spec matches twilio-oai's documented response set verbatim
            and SDK codegen produces the same response-handling
            switch. Aligned with the Twilio OpenAPI reference response set.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '404':
          description: Call not active.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Recording subsystem not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Streams.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: streams.list
      tags: [Api20100401Stream]
      summary: List active media streams for the call
      description: |
        Returns 0 or 1 entries — the runtime supports a single
        active media fork per call, matching the slot model on the
        VoiceML tracker. Pagination envelope is the Twilio-compatible
        shape so SDK auto-paginators round-trip cleanly.
      responses:
        '200':
          description: Page of streams (0 or 1 entry).
          content:
            application/json:
              schema:
                type: object
                required: [streams, page, page_size, total]
                properties:
                  streams: { type: array, items: { $ref: '#/components/schemas/Stream' } }
                  page:              { type: integer }
                  page_size:         { type: integer }
                  num_pages:         { type: integer }
                  total:             { type: integer }
                  first_page_uri:    { type: string }
                  next_page_uri:     { type: [string, "null"] }
                  previous_page_uri: { type: [string, "null"] }
                  uri:               { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: streams.create
      tags: [Api20100401Stream]
      summary: Start a media stream on the call (REST equivalent of `<Connect><Stream>`/`<Start><Stream>`)
      description: |
        Starts a media fork on the live call leg. Equivalent to
        `<Connect><Stream>` / `<Start><Stream>` in TwiML. Returns
        the new Stream resource with an MZ-prefixed sid.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Url]
              properties:
                Url:                  { type: string, description: "wss:// endpoint for the customer's WebSocket server. Required." }
                Track:                { type: string, enum: [inbound_track, outbound_track, both_tracks], description: "Accepted for SDK parity; not validated and (for Streams) not applied." }
                Name:                 { type: string }
                StatusCallback:       { type: string }
                StatusCallbackMethod: { type: string, default: "POST" }
      responses:
        '200':
          description: Stream started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stream' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Streams/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
      - $ref: '#/components/parameters/SubresourceSid'
    get:
      operationId: streams.fetch
      tags: [Api20100401Stream]
      summary: Fetch a single stream by sid
      responses:
        '200':
          description: Stream resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stream' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: streams.update
      tags: [Api20100401Stream]
      summary: Update a media stream — only Status=stopped is meaningful
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Status]
              properties:
                Status: { type: string, enum: [stopped] }
      responses:
        '200':
          description: Stream stopped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stream' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

