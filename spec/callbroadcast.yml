          schema:
            type: string
            pattern: '^\+[1-9]\d{1,14}$'
        - name: FriendlyName
          in: query
          required: false
          schema: { type: string }
        - name: Beta
          in: query
          required: false
          schema: { type: boolean }
        - name: Origin
          in: query
          required: false
          schema: { type: string, enum: [twilio, hosted] }
      responses:
        '200':
          description: Page of local incoming phone numbers.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IncomingPhoneNumberList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Phone-number store not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      operationId: incomingPhoneNumbers.createLocal
      tags: [Api20100401IncomingPhoneNumber]
      summary: Assign a local DID to the authenticated tenant
      description: |
        Twilio type-specific create alias — same semantics as
        `POST /IncomingPhoneNumbers`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [PhoneNumber]
              properties:
                PhoneNumber: { type: string }
                VoiceUrl: { type: string, format: uri }
                VoiceMethod: { type: string, enum: [GET, POST] }
      responses:
        '201':
          description: Newly assigned DID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IncomingPhoneNumber' }
        '200':
          description: Existing DID rebound (idempotent re-POST).
          content:
            application/json:
