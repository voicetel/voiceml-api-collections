openapi: 3.1.0
info:
  title: VoiceML — Twilio-compatible REST API
  version: "0.9.1"
  summary: Twilio-compatible voice (inbound + outbound), SMS, conferencing, recording, transcription, and payment platform
  description: |
    VoiceML exposes a Twilio-compatible REST + TwiML surface covering
    voice (inbound + outbound calls, conferences, queues), SMS via the
    Messages resource, mid-call recording / SIPREC / real-time
    transcription / `<Pay>` subresources, and the `IncomingPhoneNumbers`
    + `Applications` configuration surfaces. Existing Twilio SDKs
    (`twilio-node`, `twilio-python`, `twilio-go`, ...) integrate with
    minimal migration effort. Authentication, error codes, and
    pagination follow Twilio's documented conventions where supported.

    URL format: Twilio's canonical URL form ends with `.json` (e.g.
    `/Calls/{Sid}.json`). VoiceML accepts BOTH the `.json`-suffixed and
    the unsuffixed form — the server strips a trailing `.json`/`.xml`/`.wav`
    suffix before routing (see `WrapWithFormatSuffix`). The spec documents the
    `.json` form so SDKs generated against this spec produce
    Twilio-compatible URLs out of the box; existing clients that omit `.json`
    continue to work unchanged.

    Authentication is per-tenant HTTP Basic:
      * Username = `:AccountSid` (the URL path parameter, Twilio-format
        AC + 32 hex chars). Same value the Twilio SDK validates in its
        constructor — migration-compatible.
      * Password = the per-account API key.
    The same key is used to compute `X-Twilio-Signature` on outbound webhooks.

    Account management (create / rotate / disable / delete) is NOT exposed on
    this public listener — it lives on a private observability listener
    documented separately.

  contact:
    name: VoiceTel
    # Self-targeting — substituted at request time with the actual
    # base URL of the instance answering /openapi.{yaml,json}.
    url: __CB_BASE_URL__
  license:
    name: MIT with Commons Clause
    url: https://github.com/voicetel/callBroadcast/blob/main/LICENSE

servers:
  - url: __CB_BASE_URL__
    description: VoiceTel VoiceML compatibility surface

security:
  - basicAuth: []

# Tag taxonomy mirrors Twilio's `twilio-oai` `Api20100401<Resource>` naming
# so SDK codegen produces the same per-resource class/module grouping
# customers see in twilio-python / twilio-node / twilio-java / etc. The
# `Diagnostic` tag is a VoiceML extension covering /health + the OpenAPI
# self-publish endpoints (not part of Twilio's surface).
tags:
  - name: Api20100401Call
    x-displayName: Calls
    description: |
      The Call resource and its non-recording subresources
      (Notifications, Events, UserDefinedMessages). Twilio-parity tag.
  - name: Api20100401CallRecording
    x-displayName: Calls / Recordings
    description: |
      Recordings scoped to a parent call — list/start/fetch/update/delete
      under `/Calls/{Sid}/Recordings`. Mirrors twilio-oai CallRecording.
  - name: Api20100401CallNotification
    x-displayName: Calls / Notifications
    description: |
      Per-call notification list (compat stub; VoiceML's canonical event
      source is the customer's StatusCallback URL).
  - name: Api20100401CallTranscription
    x-displayName: Calls / Transcriptions
    description: |
      Per-call transcription subresource — list/create/fetch/delete
      under `/Calls/{Sid}/Transcriptions`. Twilio-parity tag.
  - name: Api20100401Transcription
    x-displayName: Transcriptions
    description: |
      Async / post-recording transcription resource — list/fetch/delete
      under `/Transcriptions` (account-scoped) and
      `/Recordings/{RecordingSid}/Transcriptions` (per-recording). Rows
      are created as a side effect of `<Record transcribe="true">`; this
      resource is read + delete only (no create). Twilio-parity tag.
  - name: Api20100401Conference
    x-displayName: Conferences
    description: |
      The Conference resource — list/fetch/update. Twilio-parity tag.
  - name: Api20100401ConferenceRecording
    x-displayName: Conferences / Recordings
    description: |
      Recordings scoped to a parent conference — list under
      `/Conferences/{Sid}/Recordings`. Twilio-parity tag.
  - name: Api20100401Participant
    x-displayName: Conferences / Participants
    description: |
      Conference participants — list/fetch/update/kick under
      `/Conferences/{Sid}/Participants`. Twilio-parity tag.
  - name: Api20100401Queue
    x-displayName: Queues
    description: |
      The Queue resource — create/list/fetch/update/delete.
      Twilio-parity tag.
  - name: Api20100401Member
    x-displayName: Queues / Members
    description: |
      Queue members — list/peekFront/dequeueFront/fetch/dequeue under
      `/Queues/{Sid}/Members`. Twilio-parity tag.
  - name: Api20100401Application
    x-displayName: Applications
    description: |
      The Application resource — create/list/fetch/update/delete.
      Twilio-parity tag.
  - name: Api20100401Account
    x-displayName: Accounts
    description: |
      The Account resource — fetch and update the authenticated account
      (self-serve `/Accounts/{Sid}.json`). Twilio-parity tag.
  - name: Api20100401Balance
    x-displayName: Balance
    description: |
      The Account Balance resource — fetch the account's current balance.
      Twilio-parity tag.
  - name: Api20100401OutgoingCallerId
    x-displayName: OutgoingCallerIds
    description: |
      The OutgoingCallerId resource — list/fetch/update/delete verified
      outbound caller IDs; POST on the collection starts a
      ValidationRequest (caller-ID verification). Twilio-parity tag.
  - name: Api20100401ValidationRequest
    x-displayName: ValidationRequest
    description: |
      The ValidationRequest resource — POST /OutgoingCallerIds.json begins
      outbound caller-ID verification. Twilio-parity tag.
  - name: Api20100401SipDomain
    x-displayName: SIP / Domains
    description: |
      The SIP Domain resource — create/list/fetch/update/delete under
      `/SIP/Domains`. Twilio-parity tag.
  - name: Api20100401SipCredentialList
    x-displayName: SIP / CredentialLists
    description: |
      The SIP CredentialList resource — create/list/fetch/update/delete
      under `/SIP/CredentialLists`. Twilio-parity tag.
  - name: Api20100401SipCredential
    x-displayName: SIP / CredentialLists / Credentials
    description: |
      SIP Credentials scoped to a parent CredentialList —
      create/list/fetch/update/delete under
      `/SIP/CredentialLists/{CredentialListSid}/Credentials`. The `password` is
      write-only (accepted on create/update, never echoed). Twilio-
      parity tag.
  - name: Api20100401SipIpAccessControlList
    x-displayName: SIP / IpAccessControlLists
    description: |
      The SIP IpAccessControlList resource — create/list/fetch/update/
      delete under `/SIP/IpAccessControlLists`. Twilio-parity tag.
  - name: Api20100401SipIpAddress
    x-displayName: SIP / IpAccessControlLists / IpAddresses
    description: |
      SIP IpAddresses scoped to a parent IpAccessControlList —
      create/list/fetch/update/delete under
      `/SIP/IpAccessControlLists/{IpAccessControlListSid}/IpAddresses`. Twilio-parity tag.
  - name: Api20100401SipDomainMapping
    x-displayName: SIP / Domains / Mappings
    description: |
      SIP Domain-to-list mappings — the CredentialListMapping,
      IpAccessControlListMapping, and per-direction Auth/Calls +
      Auth/Registrations mapping surfaces under `/SIP/Domains/{Sid}`.
      create/list/fetch/delete (no update); the response echoes the
      mapped list's shape. Twilio-parity tag.
  - name: RoutesV2SipDomain
    x-displayName: SIP / Inbound Processing Region
    description: |
      The routes/v2 SipDomain resource — Twilio's Inbound Processing
      Region API. fetch/update under `/v2/SipDomains/{SipDomain}`, keyed
      by the registrable domain name and authenticated from HTTP Basic
      credentials (no `/Accounts/{AccountSid}` path segment). Pins which
      region processes inbound calls for the domain. Twilio-parity tag.
  - name: RoutesV2PhoneNumber
    x-displayName: Phone Number / Inbound Processing Region
    description: |
      The routes/v2 PhoneNumber resource — Twilio's Inbound Processing
      Region API. fetch/update under `/v2/PhoneNumbers/{PhoneNumber}`,
      keyed by the E.164 phone number and authenticated from HTTP Basic
      credentials (no `/Accounts/{AccountSid}` path segment). Pins which
      region processes inbound calls for the number. Twilio-parity tag.
  - name: Api20100401Message
    x-displayName: Messages
    description: |
      The Message resource — create/list/fetch/update/delete. VoiceML's
      SMS + MMS surface translates Twilio-shape requests to the
      configured provider. Supplying one or more MediaUrl values makes
      the message an MMS (#473). Twilio-parity tag.
  - name: Api20100401Media
    x-displayName: Media
    description: |
      The Media subresource of a Message (#473) — list the media items
      attached to a Message, fetch a single Media instance, or delete
      one. Media bytes are served from S3 (presigned) or the recorded
      external source URL. Twilio-parity tag.
  - name: Api20100401Recording
    x-displayName: Recordings
    description: |
      Account-scoped recording catalog — list/fetch/delete + binary
      `.wav` streaming. Twilio-parity tag.
  - name: Api20100401Stream
    x-displayName: Calls / Streams
    description: |
      Media-stream subresources under `/Calls/{Sid}/Streams`. Twilio-
      parity tag.

      Wire protocol: `<Stream>` / `<Connect><Stream>` carry call audio
      over a WebSocket to the customer's `url`. VoiceML bridges every
      stream through a translation gateway so the customer receives
      **Twilio's Media Streams wire protocol** by default (#35/#463) —
      `connected` / `start` / `media` / `mark` / `stop` JSON frames
      carrying G.711 µ-law (base64), bidirectional — making the OpenAI
      Agents SDK, Pipecat, and LiveKit Twilio adapters work unchanged.
      Gating is node-level only (the `MEDIA_STREAM_GATEWAY` master
      switch plus the bidirectional `mod_audio_stream` verb); there is
      no per-tenant opt-in. If the gateway is not active the stream
      falls back to the underlying module's native framing and the
      condition is logged loudly. Barge-in (`clear`) from the customer
      is accepted but cannot interrupt in-flight playback on the
      current FreeSWITCH module — a documented limitation.
  - name: Api20100401Siprec
    x-displayName: Calls / Siprec
    description: |
      SIPREC session subresources under `/Calls/{Sid}/Siprec`. Twilio-
      parity tag.
  - name: Api20100401IncomingPhoneNumber
    x-displayName: IncomingPhoneNumbers
    description: |
      Tenant self-serve IncomingPhoneNumbers — list/create/fetch/
      update/delete. Twilio-parity tag.
  - name: Api20100401Payments
    x-displayName: Calls / Payments
    description: |
      <Pay> REST companion under `/Calls/{Sid}/Payments` — start /
      modify a PCI Pay session against an existing call leg without
      round-tripping TwiML. Gated by per-tenant
      `pay_enabled` + `stripe_secret_key`.
      Twilio-parity tag.
  - name: VoiceV1IpRecord
    x-displayName: Voice v1 / IpRecords
    description: |
      The Voice v1 IpRecord resource — create/list/fetch/update/delete
      under `/v1/IpRecords` on the voice.twilio.com surface. A standalone
      allowed source IP (with optional CIDR prefix) referenced by
      SourceIpMappings. No `/Accounts/{AccountSid}` segment; account
      resolves from HTTP Basic auth. Twilio-parity tag.
  - name: VoiceV1SourceIpMapping
    x-displayName: Voice v1 / SourceIpMappings
    description: |
      The Voice v1 SourceIpMapping resource — create/list/fetch/update/
      delete under `/v1/SourceIpMappings`. Maps an IpRecord to a SIP
      Domain so inbound calls from that source IP route to the domain.
      Twilio-parity tag.
  - name: VoiceV1ByocTrunk
    x-displayName: Voice v1 / ByocTrunks
    description: |
      The Voice v1 ByocTrunk resource — create/list/fetch/update/delete
      under `/v1/ByocTrunks`. Manages a bring-your-own-carrier trunk
      object (the management resource for the `byoc_trunk_sid` referenced
      by SIP Domains and Calls). Twilio-parity tag.
  - name: VoiceV1ConnectionPolicy
    x-displayName: Voice v1 / ConnectionPolicies
    description: |
      The Voice v1 ConnectionPolicy resource — create/list/fetch/update/
      delete under `/v1/ConnectionPolicies`. A named container for a
      prioritized set of origination Targets. Twilio-parity tag.
  - name: VoiceV1ConnectionPolicyTarget
    x-displayName: Voice v1 / ConnectionPolicies / Targets
    description: |
      Voice v1 ConnectionPolicy Targets scoped to a parent
      ConnectionPolicy — create/list/fetch/update/delete under
      `/v1/ConnectionPolicies/{ConnectionPolicySid}/Targets`. A single
      SIP URI target with priority/weight. Twilio-parity tag.
  - name: VoiceV1Settings
    x-displayName: Voice v1 / DialingPermissions Settings
    description: |
      The Voice v1 DialingPermissions Settings resource — fetch/update
      under `/v1/Settings`. Per-account dialing-permissions inheritance
      toggle. Twilio-parity tag.
  - name: VoiceV1Country
    x-displayName: Voice v1 / DialingPermissions Countries
    description: |
      The Voice v1 DialingPermissions Country resource — read-only
      list/fetch under `/v1/DialingPermissions/Countries` plus the
      HighRiskSpecialPrefixes sub-list. Twilio-parity tag.
  - name: VoiceV1HighriskSpecialPrefix
    x-displayName: Voice v1 / HighRiskSpecialPrefixes
    description: |
      The Voice v1 HighRiskSpecialPrefix read-only list under
      `/v1/DialingPermissions/Countries/{IsoCode}/HighRiskSpecialPrefixes`.
      Twilio-parity tag.
  - name: VoiceV1BulkCountryUpdate
    x-displayName: Voice v1 / BulkCountryUpdates
    description: |
      The Voice v1 BulkCountryUpdate resource — create under
      `/v1/DialingPermissions/BulkCountryUpdates`. Bulk-applies a
      dialing-permission to a set of countries. Twilio-parity tag.
  - name: VoiceV1ArchivedCall
    x-displayName: Voice v1 / Archived Calls
    description: |
      The Voice v1 archived-call deletion endpoint —
      `DELETE /v1/Archives/{Date}/Calls/{Sid}`. Twilio-parity tag.
  - name: ConversationsV1Conversation
    x-displayName: Conversations v1 / Conversations
    description: |
      The Conversations v1 Conversation resource — create/list/fetch/
      update/delete under `/v1/Conversations` on the
      conversations.twilio.com surface. A stateful messaging thread. No
      `/Accounts/{AccountSid}` segment; account resolves from HTTP Basic
      auth. Twilio-parity tag.
  - name: ConversationsV1ConversationMessage
    x-displayName: Conversations v1 / Conversation Messages
    description: |
      The Conversations v1 Conversation Message resource — create/list/
      fetch/update/delete under
      `/v1/Conversations/{ConversationSid}/Messages`. A message within a
      thread, carrying a monotonic `index`. Twilio-parity tag.
  - name: ConversationsV1ConversationParticipant
    x-displayName: Conversations v1 / Conversation Participants
    description: |
      The Conversations v1 Conversation Participant resource — create/list/
      fetch/update/delete under
      `/v1/Conversations/{ConversationSid}/Participants`. A member of a
      thread (chat identity or messaging-binding). Twilio-parity tag.
  - name: ConversationsV1ConversationMessageReceipt
    x-displayName: Conversations v1 / Message Receipts
    description: |
      The Conversations v1 Conversation Message Receipt resource —
      read-only list/fetch under
      `/v1/Conversations/{ConversationSid}/Messages/{MessageSid}/Receipts`.
      Per-channel delivery receipts. Twilio-parity tag.
  - name: ConversationsV1ConversationScopedWebhook
    x-displayName: Conversations v1 / Scoped Webhooks
    description: |
      The Conversations v1 Conversation Scoped Webhook resource —
      create/list/fetch/update/delete under
      `/v1/Conversations/{ConversationSid}/Webhooks`. A conversation-scoped
      webhook/trigger/studio target. Twilio-parity tag.
  - name: ConversationsV1Role
    x-displayName: Conversations v1 / Roles
    description: |
      The Conversations v1 Role resource — create/list/fetch/update/delete
      under `/v1/Roles`. A named permission set (conversation|service
      scope). Twilio-parity tag.
  - name: ConversationsV1User
    x-displayName: Conversations v1 / Users
    description: |
      The Conversations v1 User resource — create/list/fetch/update/delete
      under `/v1/Users`. A chat identity. Twilio-parity tag.
  - name: ConversationsV1Credential
    x-displayName: Conversations v1 / Credentials
    description: |
      The Conversations v1 push Credential resource — create/list/fetch/
      update/delete under `/v1/Credentials`. APNs/FCM/GCM push credentials;
      secret material is write-only. Twilio-parity tag.
  - name: ConversationsV1Configuration
    x-displayName: Conversations v1 / Configuration
    description: |
      The Conversations v1 Configuration resource — fetch/update under
      `/v1/Configuration`. A per-account singleton of conversation defaults.
      Twilio-parity tag.
  - name: ConversationsV1ConfigurationWebhook
    x-displayName: Conversations v1 / Configuration Webhooks
    description: |
      The Conversations v1 Configuration Webhook resource — fetch/update
      under `/v1/Configuration/Webhooks`. The account-global conversation
      webhook config. Twilio-parity tag.
  - name: ConversationsV1ConfigAddress
    x-displayName: Conversations v1 / Configuration Addresses
    description: |
      The Conversations v1 Configuration Address resource — create/list/
      fetch/update/delete under `/v1/Configuration/Addresses`. Inbound
      address auto-creation config. Twilio-parity tag.
  - name: ConversationsV1ParticipantConversation
    x-displayName: Conversations v1 / Participant Conversations
    description: |
      The Conversations v1 ParticipantConversation read-only resource — list
      under `/v1/ParticipantConversations`. Finds the conversations a
      participant (by Identity or Address) belongs to. Twilio-parity tag.
  - name: ConversationsV1ConversationWithParticipants
    x-displayName: Conversations v1 / Conversation With Participants
    description: |
      The Conversations v1 ConversationWithParticipants resource — create
      under `/v1/ConversationWithParticipants`. Creates a conversation plus
      its initial participants in one call. Twilio-parity tag.
  - name: ConversationsV1UserConversation
    x-displayName: Conversations v1 / User Conversations
    description: |
      The Conversations v1 UserConversation resource — list/fetch/update/
      delete under `/v1/Users/{Sid}/Conversations`. A user's conversation
      memberships with per-user read state and notification level.
      Twilio-parity tag.
  - name: ConversationsV1Service
    x-displayName: Conversations v1 / Services
    description: |
      The Conversations v1 Conversation Service resource — create/list/fetch/
      delete under `/v1/Services`. A container that scopes the service-mirror
      resources. Twilio-parity tag.
  - name: ConversationsV1ServiceConversation
    x-displayName: Conversations v1 / Service Conversations
    description: |
      The service-scoped Conversation resource — create/list/fetch/update/
      delete under `/v1/Services/{ChatServiceSid}/Conversations`. Identical to
      the account-level Conversation but scoped to a Conversation Service.
      Twilio-parity tag.
  - name: ConversationsV1ServiceConversationMessage
    x-displayName: Conversations v1 / Service Conversation Messages
    description: |
      The service-scoped Conversation Message resource — create/list/fetch/
      update/delete under
      `/v1/Services/{ChatServiceSid}/Conversations/{ConversationSid}/Messages`.
      Twilio-parity tag.
  - name: ConversationsV1ServiceConversationParticipant
    x-displayName: Conversations v1 / Service Conversation Participants
    description: |
      The service-scoped Conversation Participant resource — create/list/
      fetch/update/delete under the service Conversation's Participants.
      Twilio-parity tag.
  - name: ConversationsV1ServiceConversationMessageReceipt
    x-displayName: Conversations v1 / Service Message Receipts
    description: |
      The service-scoped Conversation Message Receipt resource — read-only
      list/fetch under the service Message's Receipts. Twilio-parity tag.
  - name: ConversationsV1ServiceConversationScopedWebhook
    x-displayName: Conversations v1 / Service Scoped Webhooks
    description: |
      The service-scoped Conversation Scoped Webhook resource — create/list/
      fetch/update/delete under the service Conversation's Webhooks.
      Twilio-parity tag.
  - name: ConversationsV1ServiceRole
    x-displayName: Conversations v1 / Service Roles
    description: |
      The service-scoped Role resource — create/list/fetch/update/delete under
      `/v1/Services/{ChatServiceSid}/Roles`. Twilio-parity tag.
  - name: ConversationsV1ServiceUser
    x-displayName: Conversations v1 / Service Users
    description: |
      The service-scoped User resource — create/list/fetch/update/delete under
      `/v1/Services/{ChatServiceSid}/Users`. Twilio-parity tag.
  - name: ConversationsV1ServiceConversationWithParticipants
    x-displayName: Conversations v1 / Service Conversation With Participants
    description: |
      The service-scoped ConversationWithParticipants resource — create under
      `/v1/Services/{ChatServiceSid}/ConversationWithParticipants`.
      Twilio-parity tag.
  - name: ConversationsV1ServiceParticipantConversation
    x-displayName: Conversations v1 / Service Participant Conversations
    description: |
      The service-scoped ParticipantConversation read-only resource — list
      under `/v1/Services/{ChatServiceSid}/ParticipantConversations`.
      Twilio-parity tag.
  - name: ConversationsV1ServiceUserConversation
    x-displayName: Conversations v1 / Service User Conversations
    description: |
      The service-scoped UserConversation read-only resource — list under
      `/v1/Services/{ChatServiceSid}/Users/{UserSid}/Conversations`.
      Twilio-parity tag.
  - name: ConversationsV1ServiceBinding
    x-displayName: Conversations v1 / Service Bindings
    description: |
      The service-scoped push Binding resource — list/fetch/delete under
      `/v1/Services/{ChatServiceSid}/Bindings`. Bindings are system-created on
      push registration (no create/update). Twilio-parity tag.
  - name: ConversationsV1ServiceConfiguration
    x-displayName: Conversations v1 / Service Configuration
    description: |
      The per-service Configuration singleton — fetch/update under
      `/v1/Services/{ChatServiceSid}/Configuration`. Twilio-parity tag.
  - name: ConversationsV1ServiceNotification
    x-displayName: Conversations v1 / Service Notification Config
    description: |
      The per-service push Notification configuration singleton — fetch/update
      under `/v1/Services/{ChatServiceSid}/Configuration/Notifications`.
      Twilio-parity tag.
  - name: ConversationsV1ServiceWebhookConfiguration
    x-displayName: Conversations v1 / Service Webhook Config
    description: |
      The per-service Webhook configuration singleton — fetch/update under
      `/v1/Services/{ChatServiceSid}/Configuration/Webhooks`. Twilio-parity tag.
  - name: AssistantsV1Assistant
    x-displayName: Assistants v1 / Assistants
    description: |
      The Assistants v1 Assistant resource — create/list/fetch/update/delete
      under `/v1/Assistants`. Twilio AI-Assistants product surface; the model
      field is backed per-tenant by BYO-LLM credentials. Twilio-parity tag.
  - name: AssistantsV1Tool
    x-displayName: Assistants v1 / Tools
    description: |
      The Assistants v1 Tool resource — create/list/fetch/update/delete under
      `/v1/Tools`, plus attach/detach + assistant-scoped list under
      `/v1/Assistants/{id}/Tools`. Twilio-parity tag.
  - name: AssistantsV1Knowledge
    x-displayName: Assistants v1 / Knowledge
    description: |
      The Assistants v1 Knowledge resource — create/list/fetch/update/delete
      under `/v1/Knowledge`, its read-only Status + Chunks sub-resources, plus
      attach/detach + assistant-scoped list under `/v1/Assistants/{id}/Knowledge`.
      Twilio-parity tag.
  - name: AssistantsV1Session
    x-displayName: Assistants v1 / Sessions & Messages
    description: |
      The Assistants v1 Session, Message, and SendMessage surface — list/fetch
      Sessions under `/v1/Sessions`, list a Session's Messages, and send a
      message to an Assistant via `POST /v1/Assistants/{id}/Messages` (creates
      the Session + records the turn; the BYO-LLM reply is Phase 6).
      Twilio-parity tag.
  - name: AssistantsV1Feedback
    x-displayName: Assistants v1 / Feedback
    description: |
      The Assistants v1 Feedback resource — list/create under
      `/v1/Assistants/{id}/Feedbacks`. Twilio-parity tag.
  - name: AssistantsV1Policy
    x-displayName: Assistants v1 / Policies
    description: |
      The Assistants v1 Policy read-only resource — list under `/v1/Policies`
      (filter by ToolId/KnowledgeId). Policies are materialised from the inline
      `policy` field on Tool/Knowledge create. Twilio-parity tag.
  - name: Diagnostic
    x-displayName: Diagnostics
    description: |
      VoiceML extension: /health probe and /openapi.{yaml,yml,json}
      self-publish endpoints. Not part of Twilio's surface; tagged
      separately so SDK codegen can choose to skip these or emit them
      under a non-Twilio module.

# Redoc sidebar grouping — mirrors voicetel.com/docs/api/v0.6/voiceml/.
# Operation tags stay Api20100401* for SDK codegen compatibility.
x-tagGroups:
  - name: Voice — calls
    tags:
      - Api20100401Call
      - Api20100401CallRecording
      - Api20100401Stream
      - Api20100401Siprec
      - Api20100401CallTranscription
  - name: Voice — call telemetry
    tags:
      - Api20100401CallNotification
  - name: Conferences
    tags:
      - Api20100401Conference
      - Api20100401Participant
      - Api20100401ConferenceRecording
  - name: Queues
    tags:
      - Api20100401Queue
      - Api20100401Member
  - name: Applications
    tags:
      - Api20100401Application
  - name: SIP Trunking
