components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Username MUST equal the URL `:AccountSid` path parameter.
        Password is the per-tenant API key set via the admin API.

  parameters:
    AccountSid:
      name: AccountSid
      in: path
      required: true
      description: |
        Twilio-format AccountSid: literal "AC" + 32 hex chars (34
        total). Server-generated at account creation; the same value
        the customer's Twilio SDK validates in its constructor.
      schema:
        type: string
        pattern: '^AC[0-9a-f]{32}$'
    CallSid:
      name: CallSid
      in: path
      required: true
      description: Twilio-format Call SID (`CA` + 32 hex characters).
      schema:
        type: string
        pattern: '^CA[a-f0-9]{32}$'
    RecordingSid:
      name: RecordingSid
      in: path
      required: true
      description: Twilio-format Recording SID (`RE` + 32 hex characters).
      schema:
        type: string
        pattern: '^RE[a-f0-9]{32}$'
    ConferenceSid:
      name: ConferenceSid
      in: path
      required: true
      description: |
        Twilio-compatible Conference SID — literal `CF` + 32 hex chars
        (34 total). Server-generated lazily on first
        `<Dial><Conference>` dispatch (or on first appearance in
        a `GET /Conferences` list); cleared when the conference
        ends. The v0.19.x namespaced form
        (`<AccountSid>__<friendly>`) is still accepted on input
        for migration safety, but the response always emits the
        CF shape.
      schema:
        type: string
        pattern: '^CF[a-f0-9]{32}$|^[A-Z]{2}[0-9a-f]+__.+$'

    QueueSid:
      name: QueueSid
      in: path
      required: true
      description: |
        Twilio-compatible Queue SID — literal "QU" + 32 hex chars (34
        total). Server-generated on `POST /Queues`.
      schema:
        type: string
        pattern: '^QU[0-9a-f]{32}$'

    ApplicationSid:
      name: ApplicationSid
      in: path
      required: true
      description: |
        Twilio-compatible Application SID — literal "AP" + 32 hex chars
        (34 total). Server-generated on `POST /Applications`.
      schema:
        type: string
        pattern: '^AP[0-9a-f]{32}$'

    ResourceSid:
      name: Sid
      in: path
      required: true
      description: |
        Twilio generic resource identifier on fetch-by-id endpoints
        (`CA`/`RE`/`AP`/`QU`/`CF`/`PN` + 32 hex, or dashed `CA`
        form). Parameter name is always `Sid` per twilio-oai; the
        path segment position determines which prefix is valid.
      schema:
        type: string
        pattern: '^(CA(?:[0-9a-f]{32}|[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{8})|RE[0-9a-f]{32}|AP[0-9a-f]{32}|QU[0-9a-f]{32}|CF[0-9a-f]{32}|PN[0-9a-f]{32})$'

    SubresourceSid:
      name: Sid
      in: path
      required: true
      description: |
        Twilio-compatible subresource SID — used by Streams (`MZ` prefix),
        Siprec (`SR` prefix), and Transcriptions (`GT` prefix). The
        regex covers all three subresources mounted under
        `/Calls/{CallSid}/{Streams|Siprec|Transcriptions}/{Sid}`.
      schema:
        type: string
        pattern: '^(MZ|SR|GT)[a-f0-9]{32}$'

    PhoneNumber:
      name: PhoneNumber
      in: path
      required: true
      deprecated: true
      description: |
        Legacy E.164 path form for IncomingPhoneNumber resources.
        New code SHOULD use the canonical `PhoneNumberSid` parameter
        (the `PN`-prefixed sid emitted on response). Accepted during
        the v0.5.x soft-transition window for backwards-compat with
        clients that still construct URLs from the E.164.
      schema:
        type: string
        pattern: '^\+[1-9]\d{1,14}$'

    PhoneNumberSid:
      name: PhoneNumberSid
      in: path
      required: true
      description: |
        Twilio-compatible IncomingPhoneNumber identifier — literal `PN` +
        32 lowercase hex characters (34 total). Server-generated when
        the DID is first claimed by an account; stable for the row's
        lifetime on this account. The legacy E.164 path shape
        (`/IncomingPhoneNumbers/+18005551234`) is still accepted on
        input during the v0.5.x soft-transition window — same
        precedent as `ConferenceSid` which accepts both canonical and
        legacy forms. Responses always emit the `PN…` form on the
        `sid` field regardless of which key resolved the request.
      schema:
        type: string
        pattern: '^PN[a-f0-9]{32}$|^\+[1-9]\d{1,14}$'

    SipDomainSid:
      name: Sid
      in: path
      required: true
      description: |
        Twilio-compatible SIP Domain SID — literal "SD" + 32 hex chars
        (34 total). Server-generated on `POST /SIP/Domains`.
      schema:
        type: string
        pattern: '^SD[0-9a-f]{32}$'

    SipCredentialListSid:
      name: Sid
      in: path
      required: true
      description: |
        Twilio-compatible SIP CredentialList SID — literal "CL" + 32 hex
        chars (34 total). Server-generated on `POST /SIP/CredentialLists`.
        Also names the parent list in the Credentials sub-resource path.
      schema:
        type: string
        pattern: '^CL[0-9a-f]{32}$'

    SipCredentialSid:
      name: Sid
      in: path
      required: true
      description: |
        Twilio-compatible SIP Credential SID — literal "CR" + 32 hex
        chars (34 total). Server-generated on
        `POST /SIP/CredentialLists/{CredentialListSid}/Credentials`.
      schema:
        type: string
        pattern: '^CR[0-9a-f]{32}$'

    SipIpAccessControlListSid:
      name: Sid
      in: path
      required: true
      description: |
        Twilio-compatible SIP IpAccessControlList SID — literal "AL" +
        32 hex chars (34 total). Server-generated on
        `POST /SIP/IpAccessControlLists`. Also names the parent list in
        the IpAddresses sub-resource path.
      schema:
        type: string
        pattern: '^AL[0-9a-f]{32}$'

    SipIpAddressSid:
      name: Sid
      in: path
      required: true
      description: |
        Twilio-compatible SIP IpAddress SID — literal "IP" + 32 hex
        chars (34 total). Server-generated on
        `POST /SIP/IpAccessControlLists/{IpAccessControlListSid}/IpAddresses`.
      schema:
        type: string
        pattern: '^IP[0-9a-f]{32}$'

    SipMappingListSid:
      name: Sid
      in: path
      required: true
      description: |
        The mapped list's SID on a SIP Domain mapping leaf. A
        CredentialList mapping carries a `CL…` sid; an
        IpAccessControlList mapping carries an `AL…` sid. The mapping's
        own `sid` IS the mapped list's sid (Twilio semantics).
      schema:
        type: string
        pattern: '^(CL|AL)[0-9a-f]{32}$'

    SipParentDomainSid:
      name: DomainSid
      in: path
      required: true
      description: |
        Twilio-compatible SIP Domain SID — literal "SD" + 32 hex chars
        (34 total). Names the parent Domain in a Domain mapping
        sub-resource path. Matches Twilio's `DomainSid` path-parameter
        name for the nested mapping surfaces.
      schema:
        type: string
        pattern: '^SD[0-9a-f]{32}$'

    SipParentCredentialListSid:
      name: CredentialListSid
      in: path
      required: true
      description: |
        Twilio-compatible SIP CredentialList SID — literal "CL" + 32 hex
        chars (34 total). Names the parent CredentialList in the
        Credentials sub-resource path. Matches Twilio's
        `CredentialListSid` path-parameter name.
      schema:
        type: string
        pattern: '^CL[0-9a-f]{32}$'

    SipParentIpAccessControlListSid:
      name: IpAccessControlListSid
      in: path
      required: true
      description: |
        Twilio-compatible SIP IpAccessControlList SID — literal "AL" +
        32 hex chars (34 total). Names the parent IpAccessControlList in
        the IpAddresses sub-resource path. Matches Twilio's
        `IpAccessControlListSid` path-parameter name.
      schema:
        type: string
        pattern: '^AL[0-9a-f]{32}$'

    Page:
      name: Page
      in: query
      required: false
      description: "Zero-based page index."
      schema:
        type: integer
        minimum: 0
        default: 0

    PageSize:
      name: PageSize
      in: query
      required: false
      description: "Page size. Max 1000; default 50."
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50

    PageToken:
      name: PageToken
      in: query
      required: false
      description: "The page token. This is provided by the API."
      schema:
        type: string

  schemas:
    Call:
      type: object
      required: [sid, account_sid, status, direction, api_version, uri, date_created, date_updated]
      properties:
        sid:                  { nullable: true, type: string, example: "CA1234567890abcdef1234567890abcdef" }
        account_sid:          { nullable: true, type: string, example: "AC0123456789abcdef0123456789abcdef" }
        api_version:          { nullable: true, type: string, example: "2010-04-01" }
        to:                   { nullable: true, type: string, example: "+18005551234" }
        to_formatted:         { nullable: true, type: string, description: "Human-readable national formatting of `to`, e.g. `(800) 555-1234` for US/CA numbers. Generated via libphonenumber; falls back to the E.164 form if parsing fails." }
        from:                 { nullable: true, type: string, example: "+18005550000" }
        from_formatted:       { nullable: true, type: string, description: "Human-readable national formatting of `from`. Same generation rules as `to_formatted`." }
        parent_call_sid:      { nullable: true, type: string, description: "Set on B-leg child calls (e.g. legs created by `<Dial>`). Empty on the originating A-leg or when no `<Dial>`-style bridge has occurred." }
        caller_name:          { nullable: true, type: string, description: "SIP From: display-name captured on inbound calls (CNAM-style identification). Empty for outbound originates and for inbound calls without a display name." }
        forwarded_from:       { nullable: true, type: string, description: "Originator of a forwarded inbound call, captured from the SIP `Diversion` (RFC 5806) or `History-Info` (RFC 7044) header. Empty for non-forwarded calls." }
        status:
          type: string
          enum: [queued, ringing, in-progress, completed, busy, no-answer, canceled, failed]
        direction:
          type: string
          nullable: true
          enum: [inbound, outbound-api, outbound-dial]
        answered_by:
          type: string
          nullable: true
          description: |
            AMD verdict. Wire-strict Twilio enum, suitable for
            strict-mode SDK deserialisers.
          enum: [human, machine_start, machine_end_beep, machine_end_silence,
                 machine_end_other, fax, unknown, ""]
        start_time:           { nullable: true, type: string, format: date-time-rfc-2822 }
        end_time:             { nullable: true, type: string, format: date-time-rfc-2822 }
        duration:             { nullable: true, type: string, description: "Seconds, as decimal string. Not currently populated on the Call resource — always empty." }
        price:                { nullable: true, type: string, description: "Twilio compatibility — always empty (VoiceML does not bill per-call)." }
        price_unit:           { nullable: true, type: string, description: "Twilio compatibility — always empty." }
        phone_number_sid:     { nullable: true, type: string, description: "Twilio compatibility — always empty." }
        annotation:           { type: string, description: "Twilio compatibility — always empty." }
        group_sid:            { nullable: true, type: string, description: "Twilio compatibility — always empty." }
        queue_time:           { nullable: true, type: string, description: "Twilio compatibility — always empty on the Call resource; queue wait time is exposed on the Participant resource (`Participant.queue_time`), not here." }
        trunk_sid:            { nullable: true, type: string, description: "Twilio compatibility — always empty." }
        date_created:         { nullable: true, type: string, format: date-time-rfc-2822 }
        date_updated:         { nullable: true, type: string, format: date-time-rfc-2822 }
        uri:                  { nullable: true, type: string }
        subresource_uris:
          type: object
          nullable: true
          additionalProperties: { type: string }

    CallList:
      type: object
      required: [calls, page, page_size, total]
      properties:
        calls: { type: array, items: { $ref: '#/components/schemas/Call' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Conference:
      type: object
      required: [sid, account_sid, friendly_name, status, api_version, uri]
      properties:
        sid:           { nullable: true, type: string, pattern: '^CF[a-f0-9]{32}$', example: "CF1234567890abcdef1234567890abcdef" }
        account_sid:   { nullable: true, type: string }
        friendly_name: { nullable: true, type: string, example: "incident-42" }
        status:
          type: string
          enum: [init, in-progress, completed]
          description: |
            `init` matches Twilio's transient pre-mix-engine state. VoiceML
            never emits it today (the conference materializes only after a
            participant joins), but the value is documented for SDK
            enum-deserializer compatibility.
        region:
          type: string
          nullable: true
          description: |
            Twilio edge region label. Defaults to `us1`; reserved
            for operator-overridable region taxonomy in a future
            release. Informational — VoiceML does not route
            by region today.
        api_version:   { nullable: true, type: string }
        uri:           { nullable: true, type: string }
        date_created:  { nullable: true, type: string, format: date-time-rfc-2822, description: "Emitted via omitempty when not tracked (room state is queried live; creation timestamps are not persisted)." }
        date_updated:  { nullable: true, type: string, format: date-time-rfc-2822, description: "Same caveat as `date_created`." }
        reason_conference_ended:
          type: string
          enum: [conference-ended-via-api, last-participant-kicked, last-participant-left, participant-with-end-conference-on-exit-kicked, participant-with-end-conference-on-exit-left, ""]
          description: |
            Populated only on the synthesised post-end response —
            e.g. `conference-ended-via-api` after a
            `Status=completed` POST. Empty while in-progress.
        call_sid_ending_conference:
          type: string
          nullable: true
          description: "Populated only when a participant left with `endConferenceOnExit=true`; empty otherwise."
        subresource_uris:
          type: object
          nullable: true
          additionalProperties: { type: string }
          description: "Map of `participants` and `recordings` URIs — Twilio-compatible."
        member_count:
          type: integer
          description: VoiceML extension — count of current participants. Always present; emitted as `0` on the synthesised end-conference response.

    ConferenceList:
      type: object
      required: [conferences, page, page_size, total]
      properties:
        conferences: { type: array, items: { $ref: '#/components/schemas/Conference' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Participant:
      type: object
      required: [call_sid, conference_sid, account_sid, muted, hold, coaching, queue_time, status, start_conference_on_enter, end_conference_on_exit, api_version, uri]
      properties:
        call_sid:        { nullable: true, type: string, example: "CA0123456789abcdef0123456789abcdef" }
        conference_sid:  { nullable: true, type: string }
        account_sid:     { nullable: true, type: string }
        muted:           { nullable: true, type: boolean }
        hold:            { nullable: true, type: boolean }
        call_sid_to_coach:
          type: string
          nullable: true
          description: |
            When `coaching` is true, the CallSid of the participant this
            coach can speak to (Twilio whisper-coach). Empty when
            `coaching` is false or the coach target has not joined.
        coaching:
          type: boolean
          nullable: true
          description: |
            True when this participant joined with the `coach` role
            (Twilio whisper-coach pattern). A coach hears the entire
            conference but is only audible to the participant
            identified by `call_sid_to_coach`.
        queue_time:
          type: string
          nullable: true
          description: |
            Pre-join queue-wait in seconds, string-encoded per
            Twilio's wire shape. "0" when the participant did not
            transit a queue (the common case). Populated from
            `<Enqueue>` dequeue events.
        start_conference_on_enter:
          type: boolean
          nullable: true
          description: "The per-participant `<Dial><Conference startConferenceOnEnter>` value captured at join time; falls back to the Twilio default (`true`) for participants with no recorded join."
        end_conference_on_exit:
          type: boolean
          nullable: true
          description: "The per-participant `<Dial><Conference endConferenceOnExit>` value captured at join time; falls back to the Twilio default (`false`) for participants with no recorded join."
        status:
          type: string
          enum: [queued, connecting, ringing, connected, on-hold, complete, failed, completed]
          description: |
            Derived from live conference state: `connected`
            while the participant is in the room, `on-hold` while
            the `hold` flag is set, `completed` after they've
            left (visible only briefly via the synthesised
            response when a mute/hold update races a leave).
            VoiceML currently emits only `queued`, `connected`, and
            `on-hold`; the other values are declared for SDK enum
            compatibility.
        label:           { nullable: true, type: string, description: "Optional tag set via `<Conference participantLabel=…>`. Empty when not set." }
        api_version:     { type: string }
        uri:             { nullable: true, type: string }
        date_created:    { nullable: true, type: string, format: date-time-rfc-2822, description: "Emitted via omitempty when not tracked." }
        date_updated:    { nullable: true, type: string, format: date-time-rfc-2822, description: "Emitted via omitempty when not tracked." }

    ParticipantList:
      type: object
      required: [participants, page, page_size, total]
      properties:
        participants: { type: array, items: { $ref: '#/components/schemas/Participant' } }
        page:              { type: integer }
        page_size:         { type: integer }
        total:             { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Queue:
      type: object
      required: [sid, account_sid, friendly_name, current_size, max_size, average_wait_time, date_created, date_updated, uri]
      properties:
        sid:               { nullable: true, type: string, pattern: '^QU[0-9a-f]{32}$', example: "QU0123456789abcdef0123456789abcdef" }
        account_sid:       { nullable: true, type: string }
        friendly_name:     { nullable: true, type: string, example: "support" }
        current_size:      { type: integer, description: Live count of waiting members. }
        max_size:          { type: integer, default: 0, description: "Capacity ceiling; 0 means unlimited (Twilio default). Further enqueues fail when current_size equals a positive max_size." }
        average_wait_time:
          type: integer
          description: "Seconds in the trailing 5-minute window. 0 when no recent exits."
        date_created:      { nullable: true, type: string, format: date-time-rfc-2822 }
        date_updated:      { nullable: true, type: string, format: date-time-rfc-2822 }
        uri:               { nullable: true, type: string }

    QueueList:
      type: object
      required: [queues, page, page_size, total]
      properties:
        queues:            { type: array, items: { $ref: '#/components/schemas/Queue' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        start:             { type: integer }
        end:               { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    QueueMember:
      type: object
      required: [call_sid, queue_sid, date_enqueued, wait_time, position, uri]
      properties:
        call_sid:      { nullable: true, type: string, example: "CA0123456789abcdef0123456789abcdef" }
        queue_sid:     { nullable: true, type: string }
        date_enqueued: { nullable: true, type: string, format: date-time-rfc-2822 }
        wait_time:     { type: integer, description: Seconds since enqueue. }
        position:      { type: integer, description: 1-based; 1 = front of queue (longest waiting). }
        uri:           { nullable: true, type: string }

    QueueMemberList:
      type: object
      required: [queue_members, page, page_size, total, uri]
      properties:
        queue_members:     { type: array, items: { $ref: '#/components/schemas/QueueMember' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        start:             { type: integer }
        end:               { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Application:
      type: object
      required: [sid, account_sid, friendly_name, api_version, voice_url, voice_caller_id_lookup, date_created, date_updated, uri]
      properties:
        sid:                     { nullable: true, type: string, pattern: '^AP[0-9a-f]{32}$', example: "AP0123456789abcdef0123456789abcdef" }
        account_sid:             { nullable: true, type: string }
        friendly_name:           { nullable: true, type: string, example: "ivr-main" }
        api_version:             { nullable: true, type: string }
        voice_url:               { nullable: true, type: string, description: TwiML URL fetched when <Dial><Application>SID</Application></Dial> dispatches. }
        voice_method:            { nullable: true, type: string, enum: [GET, POST] }
        voice_fallback_url:      { nullable: true, type: string, description: Fetched when voice_url returns non-2xx or fails. }
        voice_fallback_method:   { nullable: true, type: string, enum: [GET, POST] }
        voice_caller_id_lookup:  { nullable: true, type: boolean }
        status_callback:         { nullable: true, type: string }
        status_callback_method:  { nullable: true, type: string, enum: [GET, POST] }
