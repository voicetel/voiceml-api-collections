        uri:               { type: string }

    Account:
      type: object
      # No `required:` block — Twilio's api.v2010.account marks every
      # field optional (required:None). The self-serve GET/POST response
      # (internal/httpapi/account_twilio.go) ADDITIVELY embeds the VoiceML
      # extension AccountView keys alongside these Twilio fields; OAS 3.1
      # allows extra properties by default, so they validate. sid and
      # owner_account_sid deliberately omit the `^AC…` pattern/min/maxLength
      # so the schema accepts the non-AC-shaped sids used in unit tests
      # (response validation runs against this schema). Parity-lint only
      # flags a pattern/format drift when BOTH sides declare one, so
      # omitting them here produces no Twilio drift. auth_token is the one
      # Twilio Account field deliberately not emitted — see the parity-lint
      # `fields:` allowlist entry.
      properties:
        sid:               { nullable: true, type: string, example: "AC0123456789abcdef0123456789abcdef" }
        friendly_name:     { nullable: true, type: string, example: "VoiceML account" }
        status:            { type: string, enum: [active, suspended, closed], example: "active" }
        type:              { type: string, enum: [Trial, Full], example: "Full" }
        owner_account_sid: { nullable: true, type: string, example: "AC0123456789abcdef0123456789abcdef" }
        date_created:      { nullable: true, type: string, format: date-time-rfc-2822 }
        date_updated:      { nullable: true, type: string, format: date-time-rfc-2822 }
        uri:               { nullable: true, type: string }
        subresource_uris:
          type: object
          nullable: true
          additionalProperties: { type: string }

    SelfAccountUpdate:
      type: object
      # Request body for POST /Accounts/{Sid}.json. Every field is
      # optional — only the fields present are changed (only-set-fields-
      # touched). Field names mirror the gin form/JSON binding tags on
      # internal/httpapi/account_self.go's SelfAccountUpdateRequest.
      # FriendlyName is the Twilio Account field; the rest configure
      # VoiceML voice routing, BYO STT/TTS, AWS recording storage, and the
      # IP allow-list (VoiceML extensions).
      properties:
        FriendlyName:        { type: string, description: "Human-readable account name (Twilio friendly_name)." }
        VoiceUrl:            { type: string, format: uri, description: "Default voice webhook URL for the account." }
        VoiceMethod:         { type: string, enum: [GET, POST], description: "HTTP method for VoiceUrl." }
        VoiceFallbackUrl:    { type: string, format: uri, description: "Fallback voice webhook URL." }
        VoiceFallbackMethod: { type: string, enum: [GET, POST], description: "HTTP method for VoiceFallbackUrl." }
        SttFsVendor:         { type: string, description: "BYO speech-to-text FreeSWITCH vendor name." }
        SttHttpUrl:          { type: string, format: uri, description: "BYO speech-to-text HTTP endpoint." }
        SttHttpToken:        { type: string, description: "BYO speech-to-text bearer token." }
        TtsHttpUrl:          { type: string, format: uri, description: "BYO text-to-speech HTTP endpoint." }
        TtsHttpToken:        { type: string, description: "BYO text-to-speech bearer token." }
        TtsEngineName:       { type: string, description: "BYO text-to-speech engine name." }
        TtsDefaultVoice:     { type: string, description: "Default TTS voice." }
        TtsDefaultLanguage:  { type: string, description: "Default TTS language tag (e.g. en-US)." }
        AwsBucket:           { type: string, description: "S3 bucket for recording storage." }
        AwsRegion:           { type: string, description: "AWS region for the recording bucket." }
        AwsPrefix:           { type: string, description: "Key prefix within the recording bucket." }
        AwsAccessKeyId:      { type: string, description: "AWS access key ID for recording storage." }
        AwsSecretAccessKey:  { type: string, description: "AWS secret access key for recording storage." }
        AwsKmsKeyId:         { type: string, description: "AWS KMS key ID for server-side encryption." }
        AllowCidr:
          type: array
          items: { type: string }
          description: |
            IP allow-list, one CIDR prefix per entry (repeatable form param).
            An empty list explicitly clears the allow-list (wide-open).

