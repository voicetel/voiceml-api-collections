        sms_status_callback:     { nullable: true, type: string, description: "Legacy alias of message_status_callback (DLR URL for outbound SMS). Default DLR target after message_status_callback (#450)." }
        date_created:            { nullable: true, type: string, format: date-time-rfc-2822 }
        date_updated:            { nullable: true, type: string, format: date-time-rfc-2822 }
        uri:                     { nullable: true, type: string }

    ApplicationList:
      type: object
