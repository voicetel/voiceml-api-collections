  /2010-04-01/Accounts/{AccountSid}/Conferences/{ConferenceSid}/Recordings/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ConferenceSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: conferenceRecordings.fetch
      tags: [Api20100401ConferenceRecording]
      summary: Fetch a conference-scoped recording
      description: |
        Same JSON resource as `/Recordings/{RecordingSid}` but enforces
        the conference scope from the URL path. 404 if the recording exists
        but is attached to a different conference.
      responses:
        '200':
          description: Recording metadata.
          content:
            application/json:
