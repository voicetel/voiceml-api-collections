        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Phone-number store not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: incomingPhoneNumbers.update
      tags: [Api20100401IncomingPhoneNumber]
      summary: Update voice routing on an assigned DID
      description: |
        Only-set-fields-touched semantics. Tenant-scoped — a number
        assigned to a different account 404s.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                VoiceUrl:            { type: string, format: uri }
                VoiceMethod:         { type: string, enum: [GET, POST] }
                VoiceFallbackUrl:    { type: string, format: uri }
                VoiceFallbackMethod: { type: string, enum: [GET, POST] }
                SmsApplicationSid:   { type: string, description: "Bind to an Application (AP+32hex) for default outbound-SMS DLR (#450)." }
          application/json:
            schema:
              type: object
              properties:
                VoiceUrl:            { type: string, format: uri }
                VoiceMethod:         { type: string, enum: [GET, POST] }
                VoiceFallbackUrl:    { type: string, format: uri }
