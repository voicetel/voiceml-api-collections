    Recording:
      type: object
      required: [sid, account_sid, call_sid, status]
      properties:
        sid:           { nullable: true, type: string, example: "RE1234567890abcdef1234567890abcdef" }
        account_sid:   { nullable: true, type: string }
        call_sid:      { nullable: true, type: string }
        conference_sid:
          type: string
          nullable: true
          description: Set only on conference-room captures (`<Dial><Conference record="record-from-start">`); empty on per-leg recordings.
        status:
          type: string
          enum: [in-progress, paused, stopped, processing, completed, absent, deleted]
          description: |
            Twilio-compatible enum. `failed` is intentionally absent — Twilio
            does not document it on Recording.status (failure of an Outbound
            recording surfaces as `absent`). VoiceML production code only
            emits `completed`; the wider set is documented for SDK compatibility.
        source:
          type: string
          enum: [OutboundAPI, RecordVerb, DialVerb, Conference, Trunking, StartCallRecordingAPI, StartConferenceRecordingAPI]
          description: |
            Twilio-compatible enum. VoiceML production emits only
            `OutboundAPI`, `StartCallRecordingAPI`, and `Conference`;
            the other values are declared for SDK compatibility.
        channels:      { nullable: true, type: integer, minimum: 1, maximum: 2 }
        duration:      { nullable: true, type: string }
        api_version:   { nullable: true, type: string }
        uri:           { nullable: true, type: string }
        date_created:  { nullable: true, type: string, format: date-time-rfc-2822 }
        date_updated:  { nullable: true, type: string, format: date-time-rfc-2822 }
        start_time:    { nullable: true, type: string, format: date-time-rfc-2822 }
        price:         { nullable: true, type: string, description: "Reserved; VoiceML emits empty." }
        price_unit:    { nullable: true, type: string, description: "Reserved; VoiceML emits empty." }
        encryption_details:
          type: object
          nullable: true
          additionalProperties: true
          description: Reserved for SSE-KMS metadata when encryption details are exposed; currently empty.
        subresource_uris:
          type: object
          nullable: true
          additionalProperties: true
          description: Twilio-compat subresource map (currently empty).
        media_url:
          type: string
          nullable: true
          description: |
            Twilio-compatible URL for the recording audio.
            VoiceML serves the WAV at `/Accounts/{AccountSid}/Recordings/{Sid}.wav`
            — emitted here so strict-binding SDK clients (e.g.
            twilio-csharp's `recording.MediaUrl`) bind cleanly without
            null-deref. Same auth requirements as the resource itself.
        error_code:
          type: integer
          nullable: true
          description: |
            Twilio-compatible per-call error code for failed
            recordings. `null` (the common case) means no error;
            non-zero values reference twilio.com/docs/api/errors.
            The wire shape uses `null`, never `0` — strict-mode SDK
            deserialisers expect null on the no-error path.

    RecordingList:
      type: object
      required: [recordings, page, page_size, total]
      description: |
        Canonical Twilio pagination envelope for recording-list
        endpoints. Used by both the account-scoped `/Recordings`
        list, the per-call `/Calls/{Sid}/Recordings` list, and the
        per-conference `/Conferences/{Sid}/Recordings` list — every
        SDK auto-paginator depends on the same fields.
      properties:
        recordings:        { type: array, items: { $ref: '#/components/schemas/Recording' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        start:             { type: integer }
        end:               { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    IncomingPhoneNumber:
      type: object
      required: [sid, account_sid, phone_number, api_version, uri, capabilities]
      description: |
        Tenant-self-serve view of an assigned DID. Twilio-compatible —
        `sid` is the canonical `PN`-prefixed opaque identifier (34 chars)
        and `phone_number` carries the E.164 form. These are distinct
        fields.

        The full Twilio field set is documented here so strict-binding
        SDKs deserialize without throwing. Fields VoiceML doesn't track
        (regulatory, SMS, emergency, trunking) emit a Twilio-compat
        default — empty string, `null`, or the documented enum default.
        Customer code that reads e.g. `number.capabilities.voice`
        therefore works with the same SDK patterns on VoiceML and Twilio.
      properties:
        sid:                       { nullable: true, type: string, pattern: '^PN[a-f0-9]{32}$', example: "PN0123456789abcdef0123456789abcdef" }
        account_sid:               { nullable: true, type: string, pattern: '^AC[0-9a-f]{32}$' }
        phone_number:              { nullable: true, type: string, description: "E.164 — leading `+`, 7-15 digits.", example: "+18005551234" }
        friendly_name:             { nullable: true, type: string, description: "Display name. VoiceML does not model a per-DID friendly name — always emitted empty and not settable via create or update." }
        api_version:               { nullable: true, type: string, example: "2010-04-01" }
        uri:                       { nullable: true, type: string, description: "Path under `/2010-04-01/Accounts/{AccountSid}/IncomingPhoneNumbers/{Sid}.json` — uses the canonical PN sid form." }
        origin:                    { nullable: true, type: string, enum: [twilio, hosted, ""], description: "Twilio-compatible: source of the number. VoiceML emits empty (provisioning model is operator-managed, not number-buy)." }
        beta:                      { nullable: true, type: boolean, description: "Twilio-compatible: `true` for numbers from beta-availability inventory. VoiceML always emits `false`." }
        capabilities:
          type: object
          nullable: true
          required: [voice, sms, mms, fax]
          description: "Twilio-compatible: which channel types this DID supports. VoiceML is voice-only — `voice=true`, the rest `false`."
          properties:
            voice: { type: boolean }
            sms:   { type: boolean }
            mms:   { type: boolean }
            fax:   { type: boolean }
        voice_url:                 { nullable: true, type: string }
        voice_method:              { nullable: true, type: string, enum: [GET, POST] }
        voice_fallback_url:        { nullable: true, type: string }
        voice_fallback_method:     { nullable: true, type: string, enum: [GET, POST] }
        voice_application_sid:     { nullable: true, type: string, description: "Twilio-compatible: linked `AP…` Application sid that supplies voice_url. VoiceML's `<Dial><Application>` flow keeps the link on the Application resource, not here — emits empty." }
        voice_caller_id_lookup:    { nullable: true, type: boolean, description: "Twilio-compatible: CNAM lookup flag. VoiceML doesn't perform CNAM — always `false`." }
        voice_receive_mode:        { type: string, enum: [voice, fax], description: "Twilio-compatible: VoiceML routes inbound as voice only — always `voice`." }
        sms_url:                   { nullable: true, type: string, description: "Twilio-compatible: SMS handler URL. VoiceML is voice-only — empty." }
        sms_method:                { nullable: true, type: string, enum: [GET, POST, ""], description: "Twilio-compatible: empty (SMS not handled)." }
        sms_fallback_url:          { nullable: true, type: string, description: "Twilio-compatible: empty (SMS not handled)." }
        sms_fallback_method:       { nullable: true, type: string, enum: [GET, POST, ""], description: "Twilio-compatible: empty (SMS not handled)." }
        sms_application_sid:       { nullable: true, type: string, description: "Twilio-compatible: empty (SMS not handled)." }
        status_callback:           { nullable: true, type: string, description: "Twilio-compatible: lifecycle webhook. VoiceML emits empty (status is per-call via Call status_callback)." }
        status_callback_method:    { nullable: true, type: string, enum: [GET, POST, ""], description: "Twilio-compatible: empty." }
        trunk_sid:                 { nullable: true, type: string, description: "Twilio-compatible: SIP trunk routing. VoiceML uses gateway-config-driven trunking — emits empty." }
        address_sid:               { nullable: true, type: string, description: "Twilio-compatible: regulatory street-address resource. Not tracked by VoiceML — empty." }
        address_requirements:      { type: string, enum: [none, any, local, foreign, ""], description: "Twilio-compatible: address requirement class. VoiceML emits `none`." }
        identity_sid:              { nullable: true, type: string, description: "Twilio-compatible: business-identity resource. Not tracked — empty." }
        bundle_sid:                { nullable: true, type: string, description: "Twilio-compatible: regulatory bundle. Not tracked — empty." }
        emergency_status:          { type: string, enum: [Active, Inactive, ""], description: "Twilio-compatible: E911 registration. Not handled by VoiceML — emits empty." }
        emergency_address_sid:     { nullable: true, type: string, description: "Twilio-compatible: E911 address resource. Not tracked — empty." }
        emergency_address_status:  { type: string, enum: [registered, unregistered, pending-registration, registration-failure, pending-unregistration, unregistration-failure, ""], description: "Twilio-compatible: E911 registration state. Not tracked — empty." }
        status:                    { nullable: true, type: string, description: "Twilio-compatible: provisioning status (`in-use`, etc.). VoiceML doesn't model this — empty." }
        type:                      { nullable: true, type: string, enum: [local, mobile, "toll-free", ""], description: "Number class inferred from the E.164 number: US toll-free NPAs (800/833/844/855/866/877/888) → `toll-free`; every other number → `local`. `mobile` is never inferred and the empty string is never emitted." }
        date_created:              { nullable: true, type: string, format: date-time-rfc-2822 }
        date_updated:              { nullable: true, type: string, format: date-time-rfc-2822 }

    IncomingPhoneNumberList:
      type: object
      required: [incoming_phone_numbers, page, page_size, total]
      properties:
        incoming_phone_numbers: { type: array, items: { $ref: '#/components/schemas/IncomingPhoneNumber' } }
        page:                   { type: integer }
        page_size:              { type: integer }
        num_pages:              { type: integer }
        total:                  { type: integer }
        start:                  { type: integer }
        end:                    { type: integer }
        first_page_uri:         { type: string }
        next_page_uri:          { type: [string, "null"] }
        previous_page_uri:      { type: [string, "null"] }
        uri:                    { type: string }

    Stream:
      type: object
      required: [sid, account_sid, call_sid, status, api_version, uri]
      properties:
        sid:          { nullable: true, type: string, pattern: '^MZ[a-f0-9]{32}$', example: "MZ1234567890abcdef1234567890abcdef" }
        account_sid:  { nullable: true, type: string }
        call_sid:     { nullable: true, type: string }
        name:         { nullable: true, type: string, description: "Operator-supplied label for the stream; round-trips on the resource." }
        status:
          type: string
          enum: [in-progress, stopped]
        date_created: { type: string, description: "Set on start; preserved across update." }
        date_updated: { nullable: true, type: string }
        uri:          { nullable: true, type: string }

    SiprecSession:
      type: object
      required: [sid, account_sid, call_sid, status, api_version, uri]
      properties:
        sid:            { nullable: true, type: string, pattern: '^SR[a-f0-9]{32}$', example: "SR1234567890abcdef1234567890abcdef" }
        account_sid:    { nullable: true, type: string }
        call_sid:       { nullable: true, type: string }
        name:           { nullable: true, type: string }
        connector_name: { type: string, description: "Names a per-tenant SIPREC connector; resolves to that connector's Session Recording Server SIP URI. Required — pure per-tenant BYO with no operator default, so an empty, unknown, or disabled connector starts no recording (fails closed)." }
        status:
          type: string
          enum: [in-progress, stopped]
        date_created:   { type: string }
        date_updated:   { nullable: true, type: string }
        uri:            { nullable: true, type: string }

    CallPayment:
      type: object
      required: [sid, account_sid, call_sid, api_version, uri, date_created, date_updated]
      description: |
        <Pay> REST companion resource. Twilio's response shape
        is intentionally minimal — runtime config (chargeAmount,
        paymentConnector, validCardTypes, etc.) is captured server-side
        but not echoed back. `status` is tracked server-side for
        lifecycle management but is intentionally not echoed — VoiceML
        matches Twilio's minimal Payment response shape.
      properties:
        sid:          { type: string, pattern: '^PK[a-f0-9]{32}$', example: "PK1234567890abcdef1234567890abcdef" }
        account_sid:  { type: string }
        call_sid:     { type: string }
        api_version:  { type: string, example: "2010-04-01" }
        date_created: { type: string }
        date_updated: { type: string }
        uri:          { type: string }

    CallTranscription:
      type: object
      required: [sid, account_sid, call_sid, status, api_version, uri]
      description: |
        Live per-call transcription resource (REST equivalent of
        `<Start><Transcription>`). Distinct from any post-recording
        transcription resource — events are streamed via the
        StatusCallback URL while the call is live.
      properties:
        sid:                  { nullable: true, type: string, pattern: '^GT[a-f0-9]{32}$', example: "GT1234567890abcdef1234567890abcdef" }
        account_sid:          { nullable: true, type: string }
        call_sid:             { nullable: true, type: string }
        name:                 { nullable: true, type: string }
        language_code:        { type: string, description: "Echoed only when supplied on the request; the engine applies en-US when absent but does not echo it." }
        transcription_engine: { type: string, enum: [deepgram, google, aws, azure] }
        status:
          type: string
          enum: [in-progress, stopped]
        date_created:         { type: string }
        date_updated:         { nullable: true, type: string }
        uri:                  { nullable: true, type: string }

    Transcription:
      type: object
      required: [sid, account_sid, status, recording_sid, type, api_version, uri]
      description: |
        Async / post-recording transcription resource. Rows are created
        as a side effect of `<Record transcribe="true">` and are read +
        delete only. `transcription_text` is JSON `null` until `status`
        reaches `completed`.
      properties:
        sid:                { type: string, pattern: '^TR[a-f0-9]{32}$', example: "TR1234567890abcdef1234567890abcdef" }
        account_sid:        { type: string }
        status:
          type: string
          enum: [in-progress, completed, failed]
        recording_sid:      { type: string, pattern: '^RE[a-f0-9]{32}$' }
        duration:           { type: string, description: "Recording duration in whole seconds (string, per Twilio)." }
        transcription_text: { type: [string, "null"] }
        type:               { type: string, enum: [fast] }
        price:              { type: string }
        price_unit:         { type: string }
        api_version:        { type: string }
        uri:                { type: string }
        date_created:       { type: string }
        date_updated:       { type: string }

    Error:
      type: object
      required: [code, message, status]
      properties:
        code:      { type: integer, description: "Twilio numeric error code (e.g. 21211)." }
        message:   { type: string }
        more_info: { type: string, description: "URL to error documentation: `{base}/docs/errors/{code}`. Always populated." }
        status:    { type: integer, description: "HTTP status code." }

    HealthFailure:
      type: object
      required: [check, detail]
      properties:
        check:
          type: string
          example: "memdb"
          description: Identifier of the tripped check.
        detail:
          type: string
          example: "memdb ping: connection refused"
          description: Human-readable error from the underlying check, including the value-vs-threshold context where relevant.

    CreateCallRequest:
      type: object
      required: [To, From]
      properties:
        To:                                { type: string }
        From:                              { type: string }
        Url:
          type: string
          description: |
            HTTP(S) endpoint that returns TwiML when the call answers.
            Mutually exclusive with `Twiml` (inline body wins if both set).
        Method:
          type: string
          enum: [GET, POST]
          default: POST
          description: HTTP method used to fetch `Url` (Twilio default = POST).
        Twiml:
          type: string
          description: |
            Inline TwiML body — alternative to `Url`. If both are set,
            `Twiml` wins (matches Twilio's documented precedence).
        ApplicationSid:
          type: string
          description: |
            References a stored Application resource. Its `VoiceUrl` /
            `VoiceMethod` / `VoiceFallbackUrl` / `VoiceFallbackMethod` /
            `StatusCallback{,Method,Event}` fields fill any per-call
            request field that's empty. Per-call values always win —
            the Application provides defaults, not overrides.
            Cross-tenant Application lookups return 404 with the same
            shape as a nonexistent sid.
        FallbackUrl:
          type: string
          description: |
            URL to fetch TwiML from if the primary `Url` / `Twiml`
            source fails to fetch or parse. Tried only on primary
            failure.
        FallbackMethod:
          type: string
          enum: [GET, POST]
          default: POST
        StatusCallback:                    { type: string }
        StatusCallbackMethod:              { type: string, default: "POST" }
        StatusCallbackEvent:
          type: array
          items:
            type: string
            enum: [initiated, ringing, answered, completed]
        MachineDetection:
          type: string
          enum: [Enable, DetectMessageEnd]
        MachineDetectionTimeout:           { type: integer }
        MachineDetectionSpeechThreshold:   { type: integer }
        MachineDetectionSpeechEndThreshold: { type: integer }
        MachineDetectionSilenceTimeout:    { type: integer }
        AsyncAmdStatusCallback:            { type: string }
        AsyncAmdStatusCallbackMethod:      { type: string, default: "POST" }
        Record:                            { type: boolean, default: false }
        RecordingStatusCallback:           { type: string }
        RecordingStatusCallbackMethod:     { type: string, default: "POST" }
        RecordingStatusCallbackEvent:
          type: string
          description: "Comma-separated subset of `in-progress`, `completed`, `absent`."
        RecordingChannels:
          type: string
          enum: [mono, dual]
          description: "Recording channel layout. Only `mono` is honored — `dual` is accepted but a single mixed channel is written."
        RecordingTrack:
          type: string
          enum: [inbound, outbound, both]
          description: "Accepted for Twilio compatibility but currently ignored."
        Trim:
          type: string
          enum: [trim-silence, do-not-trim]
          description: "Accepted for Twilio compatibility but currently ignored."
        Timeout:
          type: integer
          minimum: 1
          default: 60
          description: "Originate timeout (seconds)."
        SendDigits:
          type: string
          description: "DTMF burst played after answer — charset `0-9*#wW` (`w`=500ms, `W`=1s pause). Wired into the originate."
        CallerId:
          type: string
          description: "Twilio compatibility — accepted but ignored. VoiceML always uses `From` as the caller ID on the originating leg; `CallerId` does not override it."
        CallReason:
          type: string
          description: "Stored as a custom channel variable on the originating call leg, accessible to customer dialplans for reporting and routing decisions."
        SipAuthUsername:
          type: string
          description: "SIP digest auth username for BYOC trunks; channel var `sip_auth_username`."
        SipAuthPassword:
          type: string
          description: "SIP digest auth password (paired with SipAuthUsername)."
        Byoc:
          type: string
          description: "Twilio BYOC Trunk SID. Accepted-and-ignored — VoiceML routes via gateways configured at deploy time."
        AsyncAmd:
          type: boolean
          description: "Twilio compatibility — AMD on VoiceML is always async; this flag is accepted but redundant."
        CallToken:
          type: string
          description: "Twilio CallToken for verified-caller-id flows. Accepted-and-ignored."

    UpdateCallRequest:
      type: object
      description: |
        POST /Calls/{Sid} body. The endpoint serves four intents:

        * `Status=completed|canceled` — terminate the live call.
        * `Twiml=<inline>` — execute inline TwiML on the live call;
          wins over `Url` when both are present (matches Twilio).
        * `Url=…` (`Method`/`FallbackUrl`/`FallbackMethod`) — fetch
          TwiML and execute on the live call. Falls through to
          `FallbackUrl` on primary fetch/parse failure.
        * `StatusCallback*` — swap the live call's lifecycle-
          callback wiring (URL / method / event-mask). Twilio
          "only-set fields" precedence: empty fields preserve the
          previous value; absent `StatusCallbackEvent` leaves the
          existing event mask, present (one or more) replaces.

        Precedence: Status wins over any TwiML source. The
        StatusCallback* update is independent and applies on every
        request that carries it (including the terminate path).
      properties:
        Status:
          type: string
          enum: [completed, canceled]
        Twiml:                 { type: string, description: "Inline TwiML body. Wins over `Url`." }
        Url:                   { type: string }
        Method:                { type: string, enum: [GET, POST], default: POST }
        FallbackUrl:           { type: string }
        FallbackMethod:        { type: string, enum: [GET, POST], default: POST }
        StatusCallback:        { type: string, description: "Swaps the live call's StatusCallback URL." }
        StatusCallbackMethod:  { type: string, description: "Swaps the live call's StatusCallback HTTP method." }
        StatusCallbackEvent:
          type: array
          items:
            type: string
            enum: [initiated, ringing, answered, completed]
          description: "Replaces the event-mask. Repeatable form param; empty list defaults to `[completed]` (Twilio default)."

    # ---------------------------------------------------------------
    # Twilio Voice v1 (voice.twilio.com/v1) resources (#420).
    # Dates are ISO-8601 (date-time), distinct from the 2010-04-01
    # surface's RFC-2822. List responses use Twilio's `meta` envelope.
    # ---------------------------------------------------------------
    VoiceV1IpRecord:
      type: object
      required: [account_sid, sid, ip_address, cidr_prefix_length, date_created, date_updated, url]
      properties:
        account_sid:        { nullable: true, type: string, pattern: '^AC[0-9a-fA-F]{32}$' }
        sid:                { nullable: true, type: string, pattern: '^IL[0-9a-fA-F]{32}$', example: "IL0123456789abcdef0123456789abcdef" }
        friendly_name:      { nullable: true, type: string, example: "carrier-a" }
        ip_address:         { nullable: true, type: string, example: "203.0.113.10" }
        cidr_prefix_length: { type: integer, example: 32 }
        date_created:       { nullable: true, type: string, format: date-time }
        date_updated:       { nullable: true, type: string, format: date-time }
        url:                { nullable: true, type: string, format: uri }

    VoiceV1Meta:
      type: object
      properties:
        first_page_url:    { nullable: true, type: string, format: uri }
        next_page_url:     { nullable: true, type: string, format: uri }
        previous_page_url: { nullable: true, type: string, format: uri }
        url:               { nullable: true, type: string, format: uri }
        page:              { nullable: true, type: integer }
        page_size:         { nullable: true, type: integer }
        key:               { nullable: true, type: string }

    VoiceV1IpRecordList:
      type: object
      required: [ip_records, meta]
      properties:
        ip_records: { type: array, items: { $ref: '#/components/schemas/VoiceV1IpRecord' } }
        meta:       { $ref: '#/components/schemas/VoiceV1Meta' }

    # ---------------------------------------------------------------
    # Twilio Conversations v1 (conversations.twilio.com/v1) resources
    # (#421). Same /v1 conventions as Voice v1: Basic-auth account
    # resolution, ISO-8601 dates, `meta` list envelope (VoiceV1Meta).
    # Field shapes mirror conversations.v1.conversation field-for-field
    # (parity-lint enforces type/format/pattern/length/nullable/enum).
    # ---------------------------------------------------------------
    ConversationsV1Conversation:
      type: object
      required: [account_sid, sid, state, attributes, date_created, date_updated, url]
      properties:
        account_sid:           { nullable: true, type: string, pattern: '^AC[0-9a-fA-F]{32}$', minLength: 34, maxLength: 34 }
        chat_service_sid:      { nullable: true, type: string, pattern: '^IS[0-9a-fA-F]{32}$', minLength: 34, maxLength: 34 }
        messaging_service_sid: { nullable: true, type: string, pattern: '^MG[0-9a-fA-F]{32}$', minLength: 34, maxLength: 34 }
        sid:                   { nullable: true, type: string, pattern: '^CH[0-9a-fA-F]{32}$', minLength: 34, maxLength: 34, example: "CH0123456789abcdef0123456789abcdef" }
        friendly_name:         { nullable: true, type: string, example: "Support thread" }
        unique_name:           { nullable: true, type: string }
        attributes:            { nullable: true, type: string, example: "{}" }
        state:                 { type: string, enum: [initializing, inactive, active, closed] }
        date_created:          { nullable: true, type: string, format: date-time }
        date_updated:          { nullable: true, type: string, format: date-time }
        timers:                { nullable: true, type: object }
        url:                   { nullable: true, type: string, format: uri }
        links:                 { nullable: true, type: object }
        bindings:              { nullable: true, type: object }

    ConversationsV1ConversationList:
      type: object
      required: [conversations, meta]
      properties:
        conversations: { type: array, items: { $ref: '#/components/schemas/ConversationsV1Conversation' } }
        meta:          { $ref: '#/components/schemas/VoiceV1Meta' }

    ConversationsV1ConversationMessage:
      type: object
      required: [account_sid, conversation_sid, sid, index, attributes, date_created, date_updated, url]
      properties:
        account_sid:      { nullable: true, type: string, pattern: '^AC[0-9a-fA-F]{32}$', minLength: 34, maxLength: 34 }
        conversation_sid: { nullable: true, type: string, pattern: '^CH[0-9a-fA-F]{32}$', minLength: 34, maxLength: 34 }
        sid:              { nullable: true, type: string, pattern: '^IM[0-9a-fA-F]{32}$', minLength: 34, maxLength: 34, example: "IM0123456789abcdef0123456789abcdef" }
        index:            { type: integer, example: 0 }
        author:           { nullable: true, type: string, example: "+15551234567" }
        body:             { nullable: true, type: string, example: "Hello" }
