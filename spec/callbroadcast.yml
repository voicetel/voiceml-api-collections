  /2010-04-01/Accounts/{AccountSid}/IncomingPhoneNumbers/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: incomingPhoneNumbers.fetch
      tags: [Api20100401IncomingPhoneNumber]
      summary: Fetch a single DID assigned to the authenticated tenant
      description: |
        Tenant-scoped — a phone number that exists but belongs to a
        different account 404s with the same shape as a nonexistent
        number (no enumeration leak).
      responses:
        '200':
          description: Incoming phone number.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IncomingPhoneNumber' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Phone-number store not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      operationId: incomingPhoneNumbers.update
      tags: [Api20100401IncomingPhoneNumber]
      summary: Update voice routing on an assigned DID
      description: |
        Only-set-fields-touched semantics. Tenant-scoped — a number
        assigned to a different account 404s.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                VoiceUrl:            { type: string, format: uri }
                VoiceMethod:         { type: string, enum: [GET, POST] }
                VoiceFallbackUrl:    { type: string, format: uri }
                VoiceFallbackMethod: { type: string, enum: [GET, POST] }
          application/json:
            schema:
              type: object
              properties:
                VoiceUrl:            { type: string, format: uri }
                VoiceMethod:         { type: string, enum: [GET, POST] }
                VoiceFallbackUrl:    { type: string, format: uri }
                VoiceFallbackMethod: { type: string, enum: [GET, POST] }
      responses:
        '200':
          description: Incoming phone number (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IncomingPhoneNumber' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Phone-number store not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      operationId: incomingPhoneNumbers.delete
      tags: [Api20100401IncomingPhoneNumber]
      summary: Release a DID from the authenticated tenant
      description: |
        Tenant-scoped — a number assigned to a different account 404s
        without affecting the row. Idempotent: 204 on success OR if
        the number was already gone.
      responses:
        '204':
          description: Phone number released.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Phone-number store not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
