openapi: 3.1.0
info:
  title: VoiceML — Twilio-compatible REST API
  version: "0.7.0"
  summary: Outbound voice + AMD service with a Twilio-compatible REST API
  description: |
    VoiceML exposes a Twilio-compatible Programmable Voice Calls REST API so
    existing Twilio SDKs (`twilio-node`, `twilio-python`, `twilio-go`, ...)
    can integrate with minimal migration effort. Authentication, error codes,
    and pagination follow Twilio's documented conventions where supported.

    URL format: Twilio's canonical URL form ends with `.json` (e.g.
    `/Calls/{Sid}.json`). VoiceML accepts BOTH the `.json`-suffixed and
    the unsuffixed form — the server strips a trailing `.json`/`.xml`/`.wav`
    suffix before routing (see `WrapWithFormatSuffix`). The spec documents the
    `.json` form so SDKs generated against this spec produce
    Twilio-compatible URLs out of the box; existing clients that omit `.json`
    continue to work unchanged.

    Authentication is per-tenant HTTP Basic:
      * Username = `:AccountSid` (the URL path parameter, Twilio-format
        AC + 32 hex chars). Same value the Twilio SDK validates in its
        constructor — migration-compatible.
      * Password = the per-account API key.
    The same key is used to compute `X-Twilio-Signature` on outbound webhooks.

    Account management (create / rotate / disable / delete) is NOT exposed on
    this public listener — it lives on a private observability listener
    documented separately.

  contact:
    name: VoiceTel
    # Self-targeting — substituted at request time with the actual
    # base URL of the instance answering /openapi.{yaml,json}.
    url: __CB_BASE_URL__
  license:
    name: MIT with Commons Clause
    url: https://github.com/voicetel/callBroadcast/blob/main/LICENSE

servers:
  - url: __CB_BASE_URL__
    description: VoiceTel VoiceML compatibility surface

security:
  - basicAuth: []

# Tag taxonomy mirrors Twilio's `twilio-oai` `Api20100401<Resource>` naming
# so SDK codegen produces the same per-resource class/module grouping
# customers see in twilio-python / twilio-node / twilio-java / etc. The
# `Diagnostic` tag is a VoiceML extension covering /health + the OpenAPI
# self-publish endpoints (not part of Twilio's surface).
tags:
  - name: Api20100401Call
    x-displayName: Calls
    description: |
      The Call resource and its non-recording subresources
      (Notifications, Events, UserDefinedMessages). Twilio-parity tag.
  - name: Api20100401CallRecording
    x-displayName: Calls / Recordings
    description: |
      Recordings scoped to a parent call — list/start/fetch/update/delete
      under `/Calls/{Sid}/Recordings`. Mirrors twilio-oai CallRecording.
  - name: Api20100401CallNotification
    x-displayName: Calls / Notifications
    description: |
      Per-call notification list (compat stub; VoiceML's canonical event
      source is the customer's StatusCallback URL).
  - name: Api20100401CallTranscription
    x-displayName: Calls / Transcriptions
    description: |
      Per-call transcription subresource — list/create/fetch/delete
      under `/Calls/{Sid}/Transcriptions`. Twilio-parity tag.
  - name: Api20100401Conference
    x-displayName: Conferences
    description: |
      The Conference resource — list/fetch/update. Twilio-parity tag.
  - name: Api20100401ConferenceRecording
    x-displayName: Conferences / Recordings
    description: |
      Recordings scoped to a parent conference — list under
      `/Conferences/{Sid}/Recordings`. Twilio-parity tag.
  - name: Api20100401Participant
    x-displayName: Conferences / Participants
    description: |
      Conference participants — list/fetch/update/kick under
      `/Conferences/{Sid}/Participants`. Twilio-parity tag.
  - name: Api20100401Queue
    x-displayName: Queues
    description: |
      The Queue resource — create/list/fetch/update/delete.
      Twilio-parity tag.
  - name: Api20100401Member
    x-displayName: Queues / Members
    description: |
      Queue members — list/peekFront/dequeueFront/fetch/dequeue under
      `/Queues/{Sid}/Members`. Twilio-parity tag.
  - name: Api20100401Application
    x-displayName: Applications
    description: |
      The Application resource — create/list/fetch/update/delete.
      Twilio-parity tag.
  - name: Api20100401Message
    x-displayName: Messages
    description: |
      The Message resource — create/list/fetch/update/delete. VoiceML's
      SMS surface translates Twilio-shape requests to the configured
      SMS provider. Outbound-only today; inbound and MMS land in a
      follow-up release. Twilio-parity tag.
  - name: Api20100401Recording
    x-displayName: Recordings
    description: |
      Account-scoped recording catalog — list/fetch/delete + binary
      `.wav` streaming. Twilio-parity tag.
  - name: Api20100401Stream
    x-displayName: Calls / Streams
    description: |
      Media-stream subresources under `/Calls/{Sid}/Streams`. Twilio-
      parity tag.
  - name: Api20100401Siprec
    x-displayName: Calls / Siprec
    description: |
      SIPREC session subresources under `/Calls/{Sid}/Siprec`. Twilio-
      parity tag.
  - name: Api20100401IncomingPhoneNumber
    x-displayName: IncomingPhoneNumbers
    description: |
      Tenant self-serve IncomingPhoneNumbers — list/create/fetch/
      update/delete. Twilio-parity tag.
  - name: Api20100401Payments
    x-displayName: Calls / Payments
    description: |
      <Pay> REST companion under `/Calls/{Sid}/Payments` — start /
      modify a PCI Pay session against an existing call leg without
      round-tripping TwiML. Gated by per-tenant
      `pay_enabled` + `stripe_secret_key`.
      Twilio-parity tag.
  - name: Diagnostic
    x-displayName: Diagnostics
    description: |
      VoiceML extension: /health probe and /openapi.{yaml,yml,json}
      self-publish endpoints. Not part of Twilio's surface; tagged
      separately so SDK codegen can choose to skip these or emit them
      under a non-Twilio module.

# Redoc sidebar grouping — mirrors voicetel.com/docs/api/v0.6/voiceml/.
# Operation tags stay Api20100401* for SDK codegen compatibility.
x-tagGroups:
  - name: Voice — calls
    tags:
      - Api20100401Call
      - Api20100401CallRecording
      - Api20100401Stream
      - Api20100401Siprec
      - Api20100401CallTranscription
  - name: Voice — call telemetry
    tags:
      - Api20100401CallNotification
  - name: Conferences
    tags:
      - Api20100401Conference
      - Api20100401Participant
      - Api20100401ConferenceRecording
  - name: Queues
    tags:
      - Api20100401Queue
      - Api20100401Member
  - name: Applications
    tags:
      - Api20100401Application
  - name: Numbers
    tags:
      - Api20100401IncomingPhoneNumber
  - name: Recordings (top-level)
    tags:
      - Api20100401Recording
  - name: Diagnostics
    tags:
      - Diagnostic

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        Username MUST equal the URL `:AccountSid` path parameter.
        Password is the per-tenant API key set via the admin API.

  parameters:
    AccountSid:
      name: AccountSid
      in: path
      required: true
      description: |
        Twilio-format AccountSid: literal "AC" + 32 hex chars (34
        total). Server-generated at account creation; the same value
        the customer's Twilio SDK validates in its constructor.
      schema:
        type: string
        pattern: '^AC[0-9a-f]{32}$'
    CallSid:
      name: CallSid
      in: path
      required: true
      description: Twilio-format Call SID (`CA` + 32 hex characters).
      schema:
        type: string
        pattern: '^CA[a-f0-9]{32}$'
    RecordingSid:
      name: RecordingSid
      in: path
      required: true
      description: Twilio-format Recording SID (`RE` + 32 hex characters).
      schema:
        type: string
        pattern: '^RE[a-f0-9]{32}$'
    ConferenceSid:
      name: ConferenceSid
      in: path
      required: true
      description: |
        Twilio-compatible Conference SID — literal `CF` + 32 hex chars
        (34 total). Server-generated lazily on first
        `<Dial><Conference>` dispatch (or on first appearance in
        a `GET /Conferences` list); cleared when the conference
        ends. The v0.19.x namespaced form
        (`<AccountSid>__<friendly>`) is still accepted on input
        for migration safety, but the response always emits the
        CF shape.
      schema:
        type: string
        pattern: '^CF[a-f0-9]{32}$|^[A-Z]{2}[0-9a-f]+__.+$'

    QueueSid:
      name: QueueSid
      in: path
      required: true
      description: |
        Twilio-compatible Queue SID — literal "QU" + 32 hex chars (34
        total). Server-generated on `POST /Queues`.
      schema:
        type: string
        pattern: '^QU[0-9a-f]{32}$'

    ApplicationSid:
      name: ApplicationSid
      in: path
      required: true
      description: |
        Twilio-compatible Application SID — literal "AP" + 32 hex chars
        (34 total). Server-generated on `POST /Applications`.
      schema:
        type: string
        pattern: '^AP[0-9a-f]{32}$'

    ResourceSid:
      name: Sid
      in: path
      required: true
      description: |
        Twilio generic resource identifier on fetch-by-id endpoints
        (`CA`/`RE`/`AP`/`QU`/`CF`/`PN` + 32 hex, or dashed `CA`
        form). Parameter name is always `Sid` per twilio-oai; the
        path segment position determines which prefix is valid.
      schema:
        type: string
        pattern: '^(CA(?:[0-9a-f]{32}|[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{8})|RE[0-9a-f]{32}|AP[0-9a-f]{32}|QU[0-9a-f]{32}|CF[0-9a-f]{32}|PN[0-9a-f]{32})$'

    SubresourceSid:
      name: Sid
      in: path
      required: true
      description: |
        Twilio-compatible subresource SID — used by Streams (`MZ` prefix),
        Siprec (`SR` prefix), and Transcriptions (`RT` prefix). The
        regex covers all three subresources mounted under
        `/Calls/{CallSid}/{Streams|Siprec|Transcriptions}/{Sid}`.
      schema:
        type: string
        pattern: '^(MZ|SR|RT)[a-f0-9]{32}$'

    PhoneNumber:
      name: PhoneNumber
      in: path
      required: true
      deprecated: true
      description: |
        Legacy E.164 path form for IncomingPhoneNumber resources.
        New code SHOULD use the canonical `PhoneNumberSid` parameter
        (the `PN`-prefixed sid emitted on response). Accepted during
        the v0.5.x soft-transition window for backwards-compat with
        clients that still construct URLs from the E.164.
      schema:
        type: string
        pattern: '^\+[1-9]\d{1,14}$'

    PhoneNumberSid:
      name: PhoneNumberSid
      in: path
      required: true
      description: |
        Twilio-compatible IncomingPhoneNumber identifier — literal `PN` +
        32 lowercase hex characters (34 total). Server-generated when
        the DID is first claimed by an account; stable for the row's
        lifetime on this account. The legacy E.164 path shape
        (`/IncomingPhoneNumbers/+18005551234`) is still accepted on
        input during the v0.5.x soft-transition window — same
        precedent as `ConferenceSid` which accepts both canonical and
        legacy forms. Responses always emit the `PN…` form on the
        `sid` field regardless of which key resolved the request.
      schema:
        type: string
        pattern: '^PN[a-f0-9]{32}$|^\+[1-9]\d{1,14}$'

    Page:
      name: Page
      in: query
      required: false
      description: "Zero-based page index."
      schema:
        type: integer
        minimum: 0
        default: 0

    PageSize:
      name: PageSize
      in: query
      required: false
      description: "Page size. Max 1000; default 50."
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50

    PageToken:
      name: PageToken
      in: query
      required: false
      description: "The page token. This is provided by the API."
      schema:
        type: string

  schemas:
    Call:
      type: object
      required: [sid, account_sid, status, direction, api_version, uri, date_created, date_updated]
      properties:
        sid:                  { type: string, example: "CA1234567890abcdef1234567890abcdef" }
        account_sid:          { type: string, example: "ACffffffffffffffffffffffffffffffff" }
        api_version:          { type: string, example: "2010-04-01" }
        to:                   { type: string, example: "+18005551234" }
        to_formatted:         { type: string, description: "Human-readable national formatting of `to`, e.g. `(800) 555-1234` for US/CA numbers. Generated via libphonenumber; falls back to the E.164 form if parsing fails." }
        from:                 { type: string, example: "+18005550000" }
        from_formatted:       { type: string, description: "Human-readable national formatting of `from`. Same generation rules as `to_formatted`." }
        parent_call_sid:      { type: string, description: "Set on B-leg child calls (e.g. legs created by `<Dial>`). Empty on the originating A-leg or when no `<Dial>`-style bridge has occurred." }
        caller_name:          { type: string, description: "SIP From: display-name captured on inbound calls (CNAM-style identification). Empty for outbound originates and for inbound calls without a display name." }
        forwarded_from:       { type: string, description: "Originator of a forwarded inbound call, captured from the SIP `Diversion` (RFC 5806) or `History-Info` (RFC 7044) header. Empty for non-forwarded calls." }
        status:
          type: string
          enum: [queued, ringing, in-progress, completed, busy, no-answer, canceled, failed]
        direction:
          type: string
          enum: [inbound, outbound-api, outbound-dial]
        answered_by:
          type: string
          description: |
            AMD verdict. Wire-strict Twilio enum, suitable for
            strict-mode SDK deserialisers.
          enum: [human, machine_start, machine_end_beep, machine_end_silence,
                 machine_end_other, fax, unknown, ""]
        start_time:           { type: string, format: date-time-rfc-2822 }
        end_time:             { type: string, format: date-time-rfc-2822 }
        duration:             { type: string, description: "Seconds, as decimal string." }
        price:                { type: string, description: "Twilio compatibility — always empty (VoiceML does not bill per-call)." }
        price_unit:           { type: string, description: "Twilio compatibility — always empty." }
        phone_number_sid:     { type: string, description: "Twilio compatibility — always empty." }
        annotation:           { type: string, description: "Twilio compatibility — always empty." }
        group_sid:            { type: string, description: "Twilio compatibility — always empty." }
        queue_time:           { type: string, description: "Seconds spent in `<Enqueue>` queue, as decimal string. Empty for non-queued calls." }
        trunk_sid:            { type: string, description: "Twilio compatibility — always empty." }
        date_created:         { type: string, format: date-time-rfc-2822 }
        date_updated:         { type: string, format: date-time-rfc-2822 }
        uri:                  { type: string }
        subresource_uris:
          type: object
          additionalProperties: { type: string }

    CallList:
      type: object
      required: [calls, page, page_size, total]
      properties:
        calls: { type: array, items: { $ref: '#/components/schemas/Call' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Conference:
      type: object
      required: [sid, account_sid, friendly_name, status, api_version, uri]
      properties:
        sid:           { type: string, pattern: '^CF[a-f0-9]{32}$', example: "CF1234567890abcdef1234567890abcdef" }
        account_sid:   { type: string }
        friendly_name: { type: string, example: "incident-42" }
        status:
          type: string
          enum: [init, in-progress, completed]
          description: |
            `init` matches Twilio's transient pre-mix-engine state. VoiceML
            never emits it today (the conference materializes only after a
            participant joins), but the value is documented for SDK
            enum-deserializer compatibility.
        region:
          type: string
          description: |
            Twilio edge region label. Defaults to `us1`; reserved
            for operator-overridable region taxonomy in a future
            release. Informational — VoiceML does not route
            by region today.
        api_version:   { type: string }
        uri:           { type: string }
        date_created:  { type: string, format: date-time-rfc-2822, description: "Emitted via omitempty when not tracked (room state is queried live; creation timestamps are not persisted)." }
        date_updated:  { type: string, format: date-time-rfc-2822, description: "Same caveat as `date_created`." }
        reason_conference_ended:
          type: string
          enum: [conference-ended-via-api, last-participant-kicked, last-participant-left, participant-with-end-conference-on-exit-kicked, participant-with-end-conference-on-exit-left, ""]
          description: |
            Populated only on the synthesised post-end response —
            e.g. `conference-ended-via-rest-api` after a
            `Status=completed` POST. Empty while in-progress.
        call_sid_ending_conference:
          type: string
          description: "Populated only when a participant left with `endConferenceOnExit=true`; empty otherwise."
        subresource_uris:
          type: object
          additionalProperties: { type: string }
          description: "Map of `participants` and `recordings` URIs — Twilio-compatible."
        member_count:
          type: integer
          description: VoiceML extension — count of current participants.

    ConferenceList:
      type: object
      required: [conferences, page, page_size, total]
      properties:
        conferences: { type: array, items: { $ref: '#/components/schemas/Conference' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Participant:
      type: object
      required: [call_sid, conference_sid, account_sid, muted, hold, coaching, queue_time, status, start_conference_on_enter, end_conference_on_exit, api_version, uri]
      properties:
        call_sid:        { type: string, example: "CA0123456789abcdef0123456789abcdef" }
        conference_sid:  { type: string }
        account_sid:     { type: string }
        muted:           { type: boolean }
        hold:            { type: boolean }
        call_sid_to_coach:
          type: string
          description: |
            When `coaching` is true, the CallSid of the participant this
            coach can speak to (Twilio whisper-coach). Empty when
            `coaching` is false or the coach target has not joined.
        coaching:
          type: boolean
          description: |
            True when this participant joined with the `coach` role
            (Twilio whisper-coach pattern). A coach hears the entire
            conference but is only audible to the participant
            identified by `call_sid_to_coach`.
        queue_time:
          type: string
          description: |
            Pre-join queue-wait in seconds, string-encoded per
            Twilio's wire shape. "0" when the participant did not
            transit a queue (the common case). Populated from
            `<Enqueue>` dequeue events via the TwiML executor.
        start_conference_on_enter:
          type: boolean
          description: "Reflects the `<Dial><Conference>` attribute used at join time. v0.19.x emits the documented default (`true`) for every participant — per-participant attribute persistence is on the roadmap."
        end_conference_on_exit:
          type: boolean
          description: "Reflects the `<Dial><Conference>` attribute used at join time. v0.19.x emits the documented default (`false`) for every participant."
        status:
          type: string
          enum: [queued, connecting, ringing, connected, on-hold, complete, failed, completed]
          description: |
            Derived from live conference state: `connected`
            while the participant is in the room, `on-hold` while
            the `hold` flag is set, `completed` after they've
            left (visible only briefly via the synthesised
            response when a mute/hold update races a leave).
        label:           { type: string, description: "Optional tag set via `<Conference participantLabel=…>`. Empty when not set." }
        api_version:     { type: string }
        uri:             { type: string }
        date_created:    { type: string, format: date-time-rfc-2822, description: "Emitted via omitempty when not tracked." }
        date_updated:    { type: string, format: date-time-rfc-2822, description: "Emitted via omitempty when not tracked." }

    ParticipantList:
      type: object
      required: [participants, page, page_size, total]
      properties:
        participants: { type: array, items: { $ref: '#/components/schemas/Participant' } }
        page:              { type: integer }
        page_size:         { type: integer }
        total:             { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Queue:
      type: object
      required: [sid, account_sid, friendly_name, current_size, max_size, average_wait_time, date_created, date_updated, uri]
      properties:
        sid:               { type: string, pattern: '^QU[0-9a-f]{32}$', example: "QU0123456789abcdef0123456789abcdef" }
        account_sid:       { type: string }
        friendly_name:     { type: string, example: "support" }
        current_size:      { type: integer, description: Live count of waiting members. }
        max_size:          { type: integer, default: 0, description: "Capacity ceiling; 0 means unlimited (Twilio default). Further enqueues fail when current_size equals a positive max_size." }
        average_wait_time:
          type: integer
          description: "Seconds in the trailing 5-minute window. 0 when no recent exits."
        date_created:      { type: string, format: date-time-rfc-2822 }
        date_updated:      { type: string, format: date-time-rfc-2822 }
        uri:               { type: string }

    QueueList:
      type: object
      required: [queues, page, page_size, total]
      properties:
        queues:            { type: array, items: { $ref: '#/components/schemas/Queue' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        start:             { type: integer }
        end:               { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    QueueMember:
      type: object
      required: [call_sid, queue_sid, account_sid, date_enqueued, wait_time, position, uri]
      properties:
        call_sid:      { type: string, example: "CA0123456789abcdef0123456789abcdef" }
        queue_sid:     { type: string }
        account_sid:   { type: string }
        date_enqueued: { type: string, format: date-time-rfc-2822 }
        wait_time:     { type: integer, description: Seconds since enqueue. }
        position:      { type: integer, description: 1-based; 1 = front of queue (longest waiting). }
        uri:           { type: string }

    QueueMemberList:
      type: object
      required: [queue_members, page, page_size, total, uri]
      properties:
        queue_members:     { type: array, items: { $ref: '#/components/schemas/QueueMember' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        start:             { type: integer }
        end:               { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Application:
      type: object
      required: [sid, account_sid, friendly_name, api_version, voice_url, voice_caller_id_lookup, date_created, date_updated, uri]
      properties:
        sid:                     { type: string, pattern: '^AP[0-9a-f]{32}$', example: "AP0123456789abcdef0123456789abcdef" }
        account_sid:             { type: string }
        friendly_name:           { type: string, example: "ivr-main" }
        api_version:             { type: string }
        voice_url:               { type: string, description: TwiML URL fetched when <Dial><Application>SID</Application></Dial> dispatches. }
        voice_method:            { type: string, enum: [GET, POST] }
        voice_fallback_url:      { type: string, description: Fetched when voice_url returns non-2xx or fails. }
        voice_fallback_method:   { type: string, enum: [GET, POST] }
        voice_caller_id_lookup:  { type: boolean }
        status_callback:         { type: string }
        status_callback_method:  { type: string, enum: [GET, POST] }
        status_callback_event:   { type: string, description: Comma-separated. }
        date_created:            { type: string, format: date-time-rfc-2822 }
        date_updated:            { type: string, format: date-time-rfc-2822 }
        uri:                     { type: string }

    ApplicationList:
      type: object
      required: [applications, page, page_size, total]
      properties:
        applications:      { type: array, items: { $ref: '#/components/schemas/Application' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        start:             { type: integer }
        end:               { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Message:
      type: object
      required: [sid, account_sid, api_version, to, from, body, status, num_segments, num_media, direction, date_created, date_updated, uri]
      properties:
        sid:                     { type: string, pattern: '^SM[0-9a-f]{32}$', example: "SM0123456789abcdef0123456789abcdef" }
        account_sid:             { type: string }
        api_version:             { type: string }
        to:                      { type: string, description: "Destination phone number in E.164 form." }
        from:                    { type: string, description: "Source phone number; falls back to the tenant's configured default sender if omitted." }
        body:                    { type: string, description: "Message text. Empty string after a redaction update." }
        status:                  { type: string, enum: [queued, sending, sent, failed, delivered, undelivered, receiving, received, accepted, scheduled, read, canceled] }
        num_segments:            { type: string, description: "Per-message segment count as Twilio surfaces it — string-typed wire format." }
        num_media:               { type: string, description: "Always '0' today (no MMS support yet)." }
        direction:               { type: string, enum: [outbound-api, outbound-call, outbound-reply, inbound] }
        price:                   { type: [string, "null"] }
        price_unit:              { type: [string, "null"] }
        error_code:              { type: [integer, "null"], description: "Twilio-shape error taxonomy. 21609 = gateway not configured; 30001 = upstream gateway failure." }
        error_message:           { type: [string, "null"], description: "Sanitised — never contains upstream URL or credentials." }
        messaging_service_sid:   { type: [string, "null"] }
        date_created:            { type: string, format: date-time-rfc-2822 }
        date_updated:            { type: string, format: date-time-rfc-2822 }
        date_sent:               { type: [string, "null"], format: date-time-rfc-2822 }
        uri:                     { type: string }
        subresource_uris:
          type: object
          properties:
            media:    { type: string }
            feedback: { type: string }

    MessageList:
      type: object
      required: [messages, page, page_size, total]
      properties:
        messages:          { type: array, items: { $ref: '#/components/schemas/Message' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        start:             { type: integer }
        end:               { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    Recording:
      type: object
      required: [sid, account_sid, call_sid, status]
      properties:
        sid:           { type: string, example: "RE1234567890abcdef1234567890abcdef" }
        account_sid:   { type: string }
        call_sid:      { type: string }
        conference_sid:
          type: string
          description: Set only on conference-room captures (`<Dial><Conference record="record-from-start">`); empty on per-leg recordings.
        status:
          type: string
          enum: [in-progress, paused, stopped, processing, completed, absent, deleted]
          description: |
            Twilio-compatible enum. `failed` is intentionally absent — Twilio
            does not document it on Recording.status (failure of an Outbound
            recording surfaces as `absent`). VoiceML production code only
            emits `completed`; the wider set is documented for SDK compatibility.
        source:
          type: string
          enum: [OutboundAPI, RecordVerb, DialVerb, Conference, Trunking, StartCallRecordingAPI, StartConferenceRecordingAPI]
        channels:      { type: integer, minimum: 1, maximum: 2 }
        duration:      { type: string }
        api_version:   { type: string }
        uri:           { type: string }
        date_created:  { type: string, format: date-time-rfc-2822 }
        date_updated:  { type: string, format: date-time-rfc-2822 }
        start_time:    { type: string, format: date-time-rfc-2822 }
        price:         { type: string, description: "Reserved; VoiceML emits empty." }
        price_unit:    { type: string, description: "Reserved; VoiceML emits empty." }
        encryption_details:
          type: object
          additionalProperties: true
          description: Reserved for SSE-KMS metadata when encryption details are exposed; currently empty.
        subresource_uris:
          type: object
          additionalProperties: true
          description: Twilio-compat subresource map (currently empty).
        media_url:
          type: string
          description: |
            Twilio-compatible URL for the recording audio.
            VoiceML serves the WAV at `/Accounts/{AccountSid}/Recordings/{Sid}.wav`
            — emitted here so strict-binding SDK clients (e.g.
            twilio-csharp's `recording.MediaUrl`) bind cleanly without
            null-deref. Same auth requirements as the resource itself.
        error_code:
          type: integer
          nullable: true
          description: |
            Twilio-compatible per-call error code for failed
            recordings. `null` (the common case) means no error;
            non-zero values reference twilio.com/docs/api/errors.
            The wire shape uses `null`, never `0` — strict-mode SDK
            deserialisers expect null on the no-error path.

    RecordingList:
      type: object
      required: [recordings, page, page_size, total]
      description: |
        Canonical Twilio pagination envelope for recording-list
        endpoints. Used by both the account-scoped `/Recordings`
        list, the per-call `/Calls/{Sid}/Recordings` list, and the
        per-conference `/Conferences/{Sid}/Recordings` list — every
        SDK auto-paginator depends on the same fields.
      properties:
        recordings:        { type: array, items: { $ref: '#/components/schemas/Recording' } }
        page:              { type: integer }
        page_size:         { type: integer }
        num_pages:         { type: integer }
        total:             { type: integer }
        start:             { type: integer }
        end:               { type: integer }
        first_page_uri:    { type: string }
        next_page_uri:     { type: [string, "null"] }
        previous_page_uri: { type: [string, "null"] }
        uri:               { type: string }

    IncomingPhoneNumber:
      type: object
      required: [sid, account_sid, phone_number, api_version, uri, capabilities]
      description: |
        Tenant-self-serve view of an assigned DID. Twilio-compatible —
        `sid` is the canonical `PN`-prefixed opaque identifier (34 chars)
        and `phone_number` carries the E.164 form. These are distinct
        fields.

        The full Twilio field set is documented here so strict-binding
        SDKs deserialize without throwing. Fields VoiceML doesn't track
        (regulatory, SMS, emergency, trunking) emit a Twilio-compat
        default — empty string, `null`, or the documented enum default.
        Customer code that reads e.g. `number.capabilities.voice`
        therefore works with the same SDK patterns on VoiceML and Twilio.
      properties:
        sid:                       { type: string, pattern: '^PN[a-f0-9]{32}$', example: "PN0123456789abcdef0123456789abcdef" }
        account_sid:               { type: string, pattern: '^AC[0-9a-f]{32}$' }
        phone_number:              { type: string, description: "E.164 — leading `+`, 7-15 digits.", example: "+18005551234" }
        friendly_name:             { type: string, description: "Display name. Empty by default in v0.5.x; tenant-editable via POST in a future release." }
        api_version:               { type: string, example: "2010-04-01" }
        uri:                       { type: string, description: "Path under `/2010-04-01/Accounts/{AccountSid}/IncomingPhoneNumbers/{Sid}.json` — uses the canonical PN sid form." }
        origin:                    { type: string, enum: [twilio, hosted, ""], description: "Twilio-compatible: source of the number. VoiceML emits empty (provisioning model is operator-managed, not number-buy)." }
        beta:                      { type: boolean, description: "Twilio-compatible: `true` for numbers from beta-availability inventory. VoiceML always emits `false`." }
        capabilities:
          type: object
          required: [voice, sms, mms, fax]
          description: "Twilio-compatible: which channel types this DID supports. VoiceML is voice-only — `voice=true`, the rest `false`."
          properties:
            voice: { type: boolean }
            sms:   { type: boolean }
            mms:   { type: boolean }
            fax:   { type: boolean }
        voice_url:                 { type: string }
        voice_method:              { type: string, enum: [GET, POST] }
        voice_fallback_url:        { type: string }
        voice_fallback_method:     { type: string, enum: [GET, POST] }
        voice_application_sid:     { type: string, description: "Twilio-compatible: linked `AP…` Application sid that supplies voice_url. VoiceML's `<Dial><Application>` flow keeps the link on the Application resource, not here — emits empty." }
        voice_caller_id_lookup:    { type: boolean, description: "Twilio-compatible: CNAM lookup flag. VoiceML doesn't perform CNAM — always `false`." }
        voice_receive_mode:        { type: string, enum: [voice, fax], description: "Twilio-compatible: VoiceML routes inbound as voice only — always `voice`." }
        sms_url:                   { type: string, description: "Twilio-compatible: SMS handler URL. VoiceML is voice-only — empty." }
        sms_method:                { type: string, enum: [GET, POST, ""], description: "Twilio-compatible: empty (SMS not handled)." }
        sms_fallback_url:          { type: string, description: "Twilio-compatible: empty (SMS not handled)." }
        sms_fallback_method:       { type: string, enum: [GET, POST, ""], description: "Twilio-compatible: empty (SMS not handled)." }
        sms_application_sid:       { type: string, description: "Twilio-compatible: empty (SMS not handled)." }
        status_callback:           { type: string, description: "Twilio-compatible: lifecycle webhook. VoiceML emits empty (status is per-call via Call status_callback)." }
        status_callback_method:    { type: string, enum: [GET, POST, ""], description: "Twilio-compatible: empty." }
        trunk_sid:                 { type: string, description: "Twilio-compatible: SIP trunk routing. VoiceML uses gateway-config-driven trunking — emits empty." }
        address_sid:               { type: string, description: "Twilio-compatible: regulatory street-address resource. Not tracked by VoiceML — empty." }
        address_requirements:      { type: string, enum: [none, any, local, foreign, ""], description: "Twilio-compatible: address requirement class. VoiceML emits `none`." }
        identity_sid:              { type: string, description: "Twilio-compatible: business-identity resource. Not tracked — empty." }
        bundle_sid:                { type: string, description: "Twilio-compatible: regulatory bundle. Not tracked — empty." }
        emergency_status:          { type: string, enum: [Active, Inactive, ""], description: "Twilio-compatible: E911 registration. Not handled by VoiceML — emits empty." }
        emergency_address_sid:     { type: string, description: "Twilio-compatible: E911 address resource. Not tracked — empty." }
        emergency_address_status:  { type: string, enum: [registered, unregistered, pending-registration, registration-failure, pending-unregistration, unregistration-failure, ""], description: "Twilio-compatible: E911 registration state. Not tracked — empty." }
        status:                    { type: string, description: "Twilio-compatible: provisioning status (`in-use`, etc.). VoiceML doesn't model this — empty." }
        type:                      { type: string, enum: [local, mobile, "toll-free", ""], description: "Twilio-compatible: number class. VoiceML doesn't categorize numbers this way — emits empty." }
        date_created:              { type: string, format: date-time-rfc-2822 }
        date_updated:              { type: string, format: date-time-rfc-2822 }

    IncomingPhoneNumberList:
      type: object
      required: [incoming_phone_numbers, page, page_size, total]
      properties:
        incoming_phone_numbers: { type: array, items: { $ref: '#/components/schemas/IncomingPhoneNumber' } }
        page:                   { type: integer }
        page_size:              { type: integer }
        num_pages:              { type: integer }
        total:                  { type: integer }
        start:                  { type: integer }
        end:                    { type: integer }
        first_page_uri:         { type: string }
        next_page_uri:          { type: [string, "null"] }
        previous_page_uri:      { type: [string, "null"] }
        uri:                    { type: string }

    Stream:
      type: object
      required: [sid, account_sid, call_sid, status, api_version, uri]
      properties:
        sid:          { type: string, pattern: '^MZ[a-f0-9]{32}$', example: "MZ1234567890abcdef1234567890abcdef" }
        account_sid:  { type: string }
        call_sid:     { type: string }
        name:         { type: string, description: "Operator-supplied label for the stream; round-trips on the resource." }
        status:
          type: string
          enum: [in-progress, stopped]
        date_created: { type: string, description: "Set on start; preserved across update." }
        date_updated: { type: string }
        uri:          { type: string }

    SiprecSession:
      type: object
      required: [sid, account_sid, call_sid, status, api_version, uri]
      properties:
        sid:            { type: string, pattern: '^SR[a-f0-9]{32}$', example: "SR1234567890abcdef1234567890abcdef" }
        account_sid:    { type: string }
        call_sid:       { type: string }
        name:           { type: string }
        connector_name: { type: string, description: "SIPREC profile name. Falls back to the configured default when empty." }
        status:
          type: string
          enum: [in-progress, stopped]
        date_created:   { type: string }
        date_updated:   { type: string }
        uri:            { type: string }

    CallPayment:
      type: object
      required: [sid, account_sid, call_sid, api_version, uri, date_created, date_updated]
      description: |
        <Pay> REST companion resource. Twilio's response shape
        is intentionally minimal — runtime config (chargeAmount,
        paymentConnector, validCardTypes, etc.) is captured server-side
        but not echoed back. VoiceML tracks the status enum locally
        so SDKs can introspect lifecycle progression; the field is
        surfaced as a VoiceML extension on top of Twilio's response
        schema.
      properties:
        sid:          { type: string, pattern: '^PY[a-f0-9]{32}$', example: "PY1234567890abcdef1234567890abcdef" }
        account_sid:  { type: string }
        call_sid:     { type: string }
        api_version:  { type: string, example: "2010-04-01" }
        date_created: { type: string }
        date_updated: { type: string }
        uri:          { type: string }

    CallTranscription:
      type: object
      required: [sid, account_sid, call_sid, status, api_version, uri]
      description: |
        Live per-call transcription resource (REST equivalent of
        `<Start><Transcription>`). Distinct from any post-recording
        transcription resource — events are streamed via the
        StatusCallback URL while the call is live.
      properties:
        sid:                  { type: string, pattern: '^RT[a-f0-9]{32}$', example: "RT1234567890abcdef1234567890abcdef" }
        account_sid:          { type: string }
        call_sid:             { type: string }
        name:                 { type: string }
        language_code:        { type: string, default: "en-US" }
        transcription_engine: { type: string, enum: [deepgram, google, aws, azure] }
        status:
          type: string
          enum: [in-progress, stopped]
        date_created:         { type: string }
        date_updated:         { type: string }
        uri:                  { type: string }

    Error:
      type: object
      required: [code, message, status]
      properties:
        code:      { type: integer, description: "Twilio numeric error code (e.g. 21211)." }
        message:   { type: string }
        more_info: { type: string }
        status:    { type: integer, description: "HTTP status code." }

    HealthFailure:
      type: object
      required: [check, detail]
      properties:
        check:
          type: string
          example: "memdb"
          description: Identifier of the tripped check (memdb / cluster / disk / cpu_load / memory / freeswitch / freeswitch_workload).
        detail:
          type: string
          example: "memdb ping: connection refused"
          description: Human-readable error from the underlying check, including the value-vs-threshold context where relevant.

    CreateCallRequest:
      type: object
      required: [To, From]
      properties:
        To:                                { type: string }
        From:                              { type: string }
        Url:
          type: string
          description: |
            HTTP(S) endpoint that returns TwiML when the call answers.
            Mutually exclusive with `Twiml` (inline body wins if both set).
        Method:
          type: string
          enum: [GET, POST]
          default: POST
          description: HTTP method used to fetch `Url` (Twilio default = POST).
        Twiml:
          type: string
          description: |
            Inline TwiML body — alternative to `Url`. If both are set,
            `Twiml` wins (matches Twilio's documented precedence).
        ApplicationSid:
          type: string
          description: |
            References a stored Application resource. Its `VoiceUrl` /
            `VoiceMethod` / `VoiceFallbackUrl` / `VoiceFallbackMethod` /
            `StatusCallback{,Method,Event}` fields fill any per-call
            request field that's empty. Per-call values always win —
            the Application provides defaults, not overrides.
            Cross-tenant Application lookups return 404 with the same
            shape as a nonexistent sid.
        FallbackUrl:
          type: string
          description: |
            URL to fetch TwiML from if the primary `Url` / `Twiml`
            source fails to fetch or parse. Tried only on primary
            failure.
        FallbackMethod:
          type: string
          enum: [GET, POST]
          default: POST
        StatusCallback:                    { type: string }
        StatusCallbackMethod:              { type: string, default: "POST" }
        StatusCallbackEvent:
          type: array
          items:
            type: string
            enum: [initiated, ringing, answered, completed]
        MachineDetection:
          type: string
          enum: [Enable, DetectMessageEnd]
        MachineDetectionTimeout:           { type: integer }
        MachineDetectionSpeechThreshold:   { type: integer }
        MachineDetectionSpeechEndThreshold: { type: integer }
        MachineDetectionSilenceTimeout:    { type: integer }
        AsyncAmdStatusCallback:            { type: string }
        AsyncAmdStatusCallbackMethod:      { type: string, default: "POST" }
        Record:                            { type: boolean, default: false }
        RecordingStatusCallback:           { type: string }
        RecordingStatusCallbackMethod:     { type: string, default: "POST" }
        RecordingStatusCallbackEvent:
          type: string
          description: "Comma-separated subset of `in-progress`, `completed`, `absent`."
        RecordingChannels:
          type: string
          enum: [mono, dual]
          description: "Recording channel layout. Accepted-and-mono-only in v0.19.x — `dual` is parsed but the writer emits a single mixed channel."
        RecordingTrack:
          type: string
          enum: [inbound, outbound, both]
          description: "Accepted-and-ignored in v0.19.x — recording captures the bridged audio regardless."
        Trim:
          type: string
          enum: [trim-silence, do-not-trim]
          description: "Accepted-and-ignored in v0.19.x — recording is fixed at `trim-silence`."
        Timeout:
          type: integer
          minimum: 1
          default: 60
          description: "Originate timeout (seconds)."
        SendDigits:
          type: string
          description: "DTMF burst played after answer — charset `0-9*#wW` (`w`=500ms, `W`=1s pause). Wired into the originate."
        CallerId:
          type: string
          description: "Alternate to `From` for SIP From: rewriting. When set, drives the channel `effective_caller_id_number`."
        CallReason:
          type: string
          description: "Stored as a custom channel variable on the originating call leg, accessible to customer dialplans for reporting and routing decisions."
        SipAuthUsername:
          type: string
          description: "SIP digest auth username for BYOC trunks; channel var `sip_auth_username`."
        SipAuthPassword:
          type: string
          description: "SIP digest auth password (paired with SipAuthUsername)."
        Byoc:
          type: string
          description: "Twilio BYOC Trunk SID. Accepted-and-ignored — VoiceML routes via gateways configured at deploy time."
        AsyncAmd:
          type: boolean
          description: "Twilio compatibility — AMD on VoiceML is always async; this flag is accepted but redundant."
        CallToken:
          type: string
          description: "Twilio CallToken for verified-caller-id flows. Accepted-and-ignored."

    UpdateCallRequest:
      type: object
      description: |
        POST /Calls/{Sid} body. The endpoint serves four intents:

        * `Status=completed|canceled` — terminate the live call.
        * `Twiml=<inline>` — execute inline TwiML on the live call;
          wins over `Url` when both are present (matches Twilio).
        * `Url=…` (`Method`/`FallbackUrl`/`FallbackMethod`) — fetch
          TwiML and execute on the live call. Falls through to
          `FallbackUrl` on primary fetch/parse failure.
        * `StatusCallback*` — swap the live call's lifecycle-
          callback wiring (URL / method / event-mask). Twilio
          "only-set fields" precedence: empty fields preserve the
          previous value; absent `StatusCallbackEvent` leaves the
          existing event mask, present (one or more) replaces.

        Precedence: Status wins over any TwiML source. The
        StatusCallback* update is independent and applies on every
        request that carries it (including the terminate path).
      properties:
        Status:
          type: string
          enum: [completed, canceled]
        Twiml:                 { type: string, description: "Inline TwiML body. Wins over `Url`." }
        Url:                   { type: string }
        Method:                { type: string, enum: [GET, POST], default: POST }
        FallbackUrl:           { type: string }
        FallbackMethod:        { type: string, enum: [GET, POST], default: POST }
        StatusCallback:        { type: string, description: "Swaps the live call's StatusCallback URL." }
        StatusCallbackMethod:  { type: string, description: "Swaps the live call's StatusCallback HTTP method." }
        StatusCallbackEvent:
          type: array
          items:
            type: string
            enum: [initiated, ringing, answered, completed]
          description: "Replaces the event-mask. Repeatable form param; empty list defaults to `[completed]` (Twilio default)."

  responses:
    Unauthorized:
      description: |
        Authentication failed. All of the following return the same 401
        with the same body, intentionally indistinguishable from outside:
          * Unknown :AccountSid
          * Disabled account
          * Wrong api_key
          * Source IP not in the account's allow_cidr (per-tenant allowlist)
      headers:
        WWW-Authenticate:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Request validation failed (invalid phone number, malformed body, ...).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Per-account rate limit exceeded.
      headers:
        Retry-After:        { schema: { type: integer } }
        X-RateLimit-Limit:  { schema: { type: integer } }
        X-RateLimit-Remaining: { schema: { type: integer } }
        X-RateLimit-Reset:  { schema: { type: integer } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

paths:
  /2010-04-01/Accounts/{AccountSid}/Calls.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: calls.list
      tags: [Api20100401Call]
      summary: List calls
      description: |
        Paginated list of call records for the given account. Filters
        match Twilio: `To`, `From`, `Status`, `ParentCallSid`,
        `StartTime` (bare = full UTC day), `StartTime<` (strict upper),
        `StartTime>` (strict lower), and the same triple for `EndTime`.
        For backwards compatibility the legacy `StartTime>=` / `EndTime<=`
        SQL-style operators are also accepted at the handler. Pagination
        via `Page` and `PageSize` (max 1000). `EndTime` filters
        restrict the result set to terminal-status rows (an in-progress
        call has no end time and cannot match an EndTime window).
      parameters:
        - { name: To,            in: query, schema: { type: string } }
        - { name: From,          in: query, schema: { type: string } }
        - { name: Status,        in: query, schema: { type: string } }
        - { name: ParentCallSid, in: query, schema: { type: string } }
        - { name: StartTime,     in: query, schema: { type: string, format: date-time }, description: "Calls started on this UTC date (YYYY-MM-DD)." }
        - { name: "StartTime<",  in: query, schema: { type: string, format: date-time }, description: "Calls started strictly before this UTC date/time." }
        - { name: "StartTime>",  in: query, schema: { type: string, format: date-time }, description: "Calls started strictly after this UTC date/time." }
        - { name: EndTime,       in: query, schema: { type: string, format: date-time }, description: "Calls ended on this UTC date (YYYY-MM-DD)." }
        - { name: "EndTime<",    in: query, schema: { type: string, format: date-time }, description: "Calls ended strictly before this UTC date/time." }
        - { name: "EndTime>",    in: query, schema: { type: string, format: date-time }, description: "Calls ended strictly after this UTC date/time." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of calls.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CallList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      operationId: calls.create
      tags: [Api20100401Call]
      summary: Create (originate) a call
      description: |
        Originates an outbound call. The `To` and `From`
        numbers are validated and normalised to E.164 against the
        authenticated tenant's `phone_regions` list — set per-account in
        the admin API. Empty list disables validation; multi-region
        tenants accept numbers valid in any listed region.
        `MachineDetection` is optional; omitting it skips AMD entirely.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: { $ref: '#/components/schemas/CreateCallRequest' }
          application/json:
            schema: { $ref: '#/components/schemas/CreateCallRequest' }
      responses:
        '201':
          description: Call created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Call' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '502':
          description: Originate failed (carrier unreachable, internal error, ...).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: calls.fetch
      tags: [Api20100401Call]
      summary: Fetch a call
      responses:
        '200':
          description: Call resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Call' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: calls.update
      tags: [Api20100401Call]
      summary: Update or terminate a live call
      description: |
        Three flows on the same endpoint (mirrors Twilio):
          * `Status=completed|canceled` — terminate the call.
          * `Twiml=<inline>` — execute inline TwiML on the live call
            (wins over `Url` when both are present).
          * `Url=…` — fetch new TwiML and execute it on the live call
            (live redirect / hot swap).
        If `Status` is present alongside any TwiML source, `Status`
        wins. The success response is the full Call resource — same
        shape `GET` returns — so SDK deserialisers round-trip.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: { $ref: '#/components/schemas/UpdateCallRequest' }
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCallRequest' }
      responses:
        '200':
          description: Update applied. Full Call resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Call' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '502':
          description: TwiML fetch / execute failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      operationId: calls.delete
      tags: [Api20100401Call]
      summary: Delete a call record
      responses:
        '204':
          description: Call deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Conferences.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: conferences.list
      tags: [Api20100401Conference]
      summary: List active conferences for the account
      description: |
        Returns conferences currently active for this tenant. Live
        query — no caching, always reflects state at request time.
        Conferences appear once a first participant joins (typically
        via TwiML `<Dial><Conference>`) and disappear as soon as the
        last participant leaves.
      parameters:
        - { name: FriendlyName, in: query, schema: { type: string }, description: "Filter to conferences with this exact FriendlyName." }
        - { name: Status, in: query, schema: { type: string, enum: [init, in-progress, completed] }, description: "Filter to conferences in this lifecycle state." }
        - { name: DateCreated, in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible parameter. VoiceML's conference list is a live query with no historical store — accepted but does not narrow the result set." }
        - { name: "DateCreated<", in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - { name: "DateCreated>", in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - { name: DateUpdated, in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - { name: "DateUpdated<", in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - { name: "DateUpdated>", in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of conferences.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConferenceList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Conference subsystem not configured (passive AMD-on-fork mode).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /2010-04-01/Accounts/{AccountSid}/Conferences/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: conferences.fetch
      tags: [Api20100401Conference]
      summary: Fetch a single conference
      responses:
        '200':
          description: Conference resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conference' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: conferences.update
      tags: [Api20100401Conference]
      summary: End an active conference
      description: |
        v1 supports only `Status=completed` — kicks every participant
        and tears down the room. Twilio's other update fields
        (`Announce*`) are not yet implemented.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Status]
              properties:
                Status: { type: string, enum: [completed] }
      responses:
        '200':
          description: Conference ended (synthesised post-end view).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conference' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Conference subsystem not configured (passive AMD-on-fork mode).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /2010-04-01/Accounts/{AccountSid}/Conferences/{ConferenceSid}/Participants.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ConferenceSid'
    get:
      operationId: participants.list
      tags: [Api20100401Participant]
      summary: List participants in a conference
      parameters:
        - { name: Muted,    in: query, schema: { type: boolean }, description: "Filter to participants with this Muted state." }
        - { name: Hold,     in: query, schema: { type: boolean }, description: "Filter to participants with this Hold state." }
        - { name: Coaching, in: query, schema: { type: boolean }, description: "Filter to participants with this Coaching state." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of participants.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParticipantList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: participants.create
      tags: [Api20100401Participant]
      summary: Dial a participant into a conference
      description: |
        Places an outbound call from `From` to `To` that joins the named
        conference on answer via inline TwiML. Returns immediately with
        `status=queued` while the leg is ringing.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [From, To]
              properties:
                From: { type: string, description: "Caller ID / originating endpoint (E.164 or Twilio client:/sip:/app: form)." }
                To:   { type: string, description: "Destination endpoint to dial into the conference." }
                Label: { type: string }
                Muted: { type: boolean }
                StartConferenceOnEnter: { type: boolean, default: true }
                EndConferenceOnExit: { type: boolean, default: false }
                Timeout: { type: integer, description: "Ring timeout in seconds (default 60)." }
                StatusCallback: { type: string, format: uri }
                StatusCallbackMethod: { type: string, enum: [GET, POST] }
                StatusCallbackEvent: { type: string }
      responses:
        '201':
          description: Participant resource (queued while dialing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502':
          description: Outbound originate dispatch failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Conference or outbound dial subsystem not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /2010-04-01/Accounts/{AccountSid}/Conferences/{ConferenceSid}/Participants/{CallSid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ConferenceSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: participants.fetch
      tags: [Api20100401Participant]
      summary: Fetch a single participant
      responses:
        '200':
          description: Participant resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: participants.update
      tags: [Api20100401Participant]
      summary: Mute / unmute / hold a participant
      description: |
        At least one of `Muted` or `Hold` must be set. Twilio's
        `HoldUrl` (custom hold-music URL) and `AnnounceUrl` are
        not yet implemented.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Muted: { type: boolean, description: "Mute / unmute the participant." }
                Hold:  { type: boolean, description: "Place the participant on hold (default hold-music profile) or remove from hold." }
      responses:
        '200':
          description: Participant resource (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: participants.delete
      tags: [Api20100401Participant]
      summary: Kick a participant out of the conference
      responses:
        '204':
          description: Participant kicked.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Queues.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    post:
      operationId: queues.create
      tags: [Api20100401Queue]
      summary: Create a queue
      description: |
        Create a named queue. Idempotent — POSTing the same
        FriendlyName a second time returns the existing queue rather
        than erroring (matches Twilio).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [FriendlyName]
              properties:
                FriendlyName: { type: string, maxLength: 64 }
                MaxSize:      { type: integer, default: 0, minimum: 0 }
      responses:
        '201':
          description: Queue resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Queue' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Queue subsystem not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      operationId: queues.list
      tags: [Api20100401Queue]
      summary: List queues for the account (paged, FriendlyName ASC)
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of queues.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Queues/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: queues.fetch
      tags: [Api20100401Queue]
      summary: Fetch a queue
      responses:
        '200':
          description: Queue resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Queue' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: queues.update
      tags: [Api20100401Queue]
      summary: Update a queue (FriendlyName / MaxSize)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                FriendlyName: { type: string, maxLength: 64 }
                MaxSize:      { type: integer, minimum: 0 }
      responses:
        '200':
          description: Queue resource (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Queue' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: queues.delete
      tags: [Api20100401Queue]
      summary: Delete a queue
      description: |
        Refused with 409 if any members are still waiting — caller must
        drain the queue first (matches Twilio's behaviour).
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Queue still has waiting members.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /2010-04-01/Accounts/{AccountSid}/Queues/{QueueSid}/Members.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/QueueSid'
    get:
      operationId: queueMembers.list
      tags: [Api20100401Member]
      summary: List waiting members in a queue
      description: |
        Returned ordered by position; position 1 = longest waiting
        (front of queue).
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Members list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueMemberList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Queues/{QueueSid}/Members/Front.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/QueueSid'
    get:
      operationId: queueMembers.fetchFront
      tags: [Api20100401Member]
      summary: Peek the longest-waiting member
      responses:
        '200':
          description: Front-of-queue member.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueMember' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Queue empty or not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      operationId: queueMembers.dequeueFront
      tags: [Api20100401Member]
      summary: Dequeue the front member to a TwiML URL
      description: |
        Pops the longest-waiting member and redirects their call to the
        URL in the body. The member's <Enqueue> wait-loop fetches that
        URL and runs the returned TwiML on their leg as continuation.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Url]
              properties:
                Url:    { type: string, format: uri, description: HTTPS-only. }
                Method: { type: string, enum: [GET, POST], default: POST }
      responses:
        '200':
          description: Dequeued member.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueMember' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Queue empty or not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /2010-04-01/Accounts/{AccountSid}/Queues/{QueueSid}/Members/{CallSid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/QueueSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: queueMembers.fetch
      tags: [Api20100401Member]
      summary: Fetch a specific member by CallSid
      responses:
        '200':
          description: Queue member.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueMember' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: queueMembers.dequeue
      tags: [Api20100401Member]
      summary: Dequeue a specific member to a TwiML URL
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Url]
              properties:
                Url:    { type: string, format: uri }
                Method: { type: string, enum: [GET, POST], default: POST }
      responses:
        '200':
          description: Dequeued member.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueMember' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Applications.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    post:
      operationId: applications.create
      tags: [Api20100401Application]
      summary: Create an Application
      description: |
        Persistent named TwiML+callback bundle — referenced by
        `<Dial><Application>AP…</Application></Dial>`. The agent's
        Dial verb resolves the SID, fetches voice_url, and runs the
        returned TwiML on the call leg.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                FriendlyName:           { type: string }
                VoiceUrl:               { type: string, format: uri }
                VoiceMethod:            { type: string, enum: [GET, POST] }
                VoiceFallbackUrl:       { type: string, format: uri }
                VoiceFallbackMethod:    { type: string, enum: [GET, POST] }
                VoiceCallerIdLookup:    { type: boolean }
                StatusCallback:         { type: string, format: uri }
                StatusCallbackMethod:   { type: string, enum: [GET, POST] }
                StatusCallbackEvent:    { type: string, description: Comma-separated. }
      responses:
        '201':
          description: Application resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Application' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Application subsystem not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      operationId: applications.list
      tags: [Api20100401Application]
      summary: List Applications for the account (paged, FriendlyName ASC)
      parameters:
        - { name: FriendlyName, in: query, schema: { type: string }, description: "Filter to Applications with this exact FriendlyName." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of Applications.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApplicationList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Applications/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: applications.fetch
      tags: [Api20100401Application]
      summary: Fetch an Application
      responses:
        '200':
          description: Application resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Application' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: applications.update
      tags: [Api20100401Application]
      summary: Update an Application (partial — only set fields are touched)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                FriendlyName:         { type: string }
                VoiceUrl:             { type: string, format: uri }
                VoiceMethod:          { type: string, enum: [GET, POST] }
                VoiceFallbackUrl:     { type: string, format: uri }
                VoiceFallbackMethod:  { type: string, enum: [GET, POST] }
                VoiceCallerIdLookup:  { type: boolean }
                StatusCallback:       { type: string, format: uri }
                StatusCallbackMethod: { type: string, enum: [GET, POST] }
                StatusCallbackEvent:  { type: string }
      responses:
        '200':
          description: Application resource (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Application' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: applications.delete
      tags: [Api20100401Application]
      summary: Delete an Application
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Messages.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    post:
      operationId: messages.create
      tags: [Api20100401Message]
      summary: Send an SMS
      description: |
        Sends `Body` to `To` via the configured SMS provider. When
        the provider is not configured the row is still persisted
        with status=failed and error_code=21609 so the integrator can
        introspect the rejection through GET /Messages/{Sid}.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [To, Body]
              properties:
                To:                  { type: string, description: "Destination phone number (E.164)." }
                From:                { type: string, description: "Source phone number; falls back to the tenant's configured default sender." }
                Body:                { type: string, description: "Message text." }
                MessagingServiceSid: { type: string, description: "Accepted for parity; not yet routed against." }
                StatusCallback:      { type: string, format: uri, description: "Reserved — outbound SMS is fire-and-forget today." }
      responses:
        '201':
          description: Message resource (status=sent or status=failed).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: SMS gateway not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      operationId: messages.list
      tags: [Api20100401Message]
      summary: List Messages for the account (paged, DateCreated DESC)
      parameters:
        - { name: To,        in: query, schema: { type: string } }
        - { name: From,      in: query, schema: { type: string } }
        - { name: DateSent,  in: query, schema: { type: string, format: date-time-rfc-2822 } }
        - { name: 'DateSent<', in: query, schema: { type: string, format: date-time-rfc-2822 } }
        - { name: 'DateSent>', in: query, schema: { type: string, format: date-time-rfc-2822 } }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of Messages.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Messages/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: messages.fetch
      tags: [Api20100401Message]
      summary: Fetch a Message
      responses:
        '200':
          description: Message resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: messages.update
      tags: [Api20100401Message]
      summary: Update a Message (Body redaction; Status=canceled rejected)
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Body:   { type: string, description: "Pass empty string to redact. Non-empty Body is ignored — Twilio's documented redaction semantics." }
                Status: { type: string, enum: [canceled], description: "Returns 21610 — outbound SMS is fire-and-forget, no cancel path." }
      responses:
        '200':
          description: Message resource (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Message' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Cancellation not supported by the SMS provider.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      operationId: messages.delete
      tags: [Api20100401Message]
      summary: Delete a Message
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Recordings.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: recordings.list
      tags: [Api20100401Recording]
      summary: List recordings for the account
      parameters:
        - { name: DateCreated,  in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created on this UTC date (YYYY-MM-DD)." }
        - { name: "DateCreated<", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly before this UTC date." }
        - { name: "DateCreated>", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly after this UTC date." }
        - { name: CallSid, in: query, schema: { type: string, pattern: "^CA[0-9a-fA-F]{32}$" }, description: "Filter to recordings whose CallSid equals this value." }
        - { name: ConferenceSid, in: query, schema: { type: string, pattern: "^CF[0-9a-fA-F]{32}$" }, description: "Filter to recordings whose ConferenceSid equals this value." }
        - name: IncludeSoftDeleted
          in: query
          required: false
          schema: { type: boolean }
          description: |
            Twilio-compatible parameter. VoiceML hard-deletes recordings —
            there is no soft-delete store — so this parameter is
            accepted but does not change the result set.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of recordings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecordingList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Recordings.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: callRecordings.list
      tags: [Api20100401CallRecording]
      summary: List recordings for one call
      parameters:
        - { name: DateCreated,  in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created on this UTC date (YYYY-MM-DD)." }
        - { name: "DateCreated<", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly before this UTC date." }
        - { name: "DateCreated>", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly after this UTC date." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of recordings.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecordingList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: callRecordings.create
      tags: [Api20100401CallRecording]
      summary: Start a recording mid-call
      description: |
        Begins a fresh recording on the live call leg. The new
        Recording resource is returned in the 201 response. Distinct
        from `Record=true` on `POST /Calls`, which captures from the
        start of the call.
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                RecordingMaxDuration:          { type: integer, description: "Cap recording length in seconds. 0 = no limit." }
                RecordingChannels:             { type: string, enum: [mono, dual] }
                PlayBeep:                      { type: boolean, default: true }
                RecordingStatusCallback:       { type: string }
                RecordingStatusCallbackMethod: { type: string, default: "POST" }
                RecordingStatusCallbackEvent:  { type: string, description: "Comma-separated: in-progress,completed,absent" }
      responses:
        '200':
          description: Recording started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '201':
          description: |
            Recording started (Twilio-historical 201 Created). VoiceML
            returns 200 OK exclusively; this code is declared so the
            spec matches twilio-oai's documented response set verbatim
            and SDK codegen produces the same response-handling
            switch. Aligned with the Twilio OpenAPI reference response set.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Recording' }
        '404':
          description: Call not active.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Recording subsystem not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Streams.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: streams.list
      tags: [Api20100401Stream]
      summary: List active media streams for the call
      description: |
        Returns 0 or 1 entries — mod_audio_fork supports a single
        active fork per call uuid, matching the slot model on the
        VoiceML tracker. Pagination envelope is the Twilio-compatible
        shape so SDK auto-paginators round-trip cleanly.
      responses:
        '200':
          description: Page of streams (0 or 1 entry).
          content:
            application/json:
              schema:
                type: object
                required: [streams, page, page_size, total]
                properties:
                  streams: { type: array, items: { $ref: '#/components/schemas/Stream' } }
                  page:              { type: integer }
                  page_size:         { type: integer }
                  num_pages:         { type: integer }
                  total:             { type: integer }
                  first_page_uri:    { type: string }
                  next_page_uri:     { type: [string, "null"] }
                  previous_page_uri: { type: [string, "null"] }
                  uri:               { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: streams.create
      tags: [Api20100401Stream]
      summary: Start a media stream on the call (REST equivalent of `<Connect><Stream>`/`<Start><Stream>`)
      description: |
        Issues `uuid_audio_fork start` on the call leg via the same
        executor primitive the TwiML verbs use. Returns the new Stream
        resource with an MZ-prefixed sid.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Url]
              properties:
                Url:                  { type: string, description: "wss:// endpoint for the customer's WebSocket server. Required." }
                Track:                { type: string, enum: [inbound_track, outbound_track, both_tracks] }
                Name:                 { type: string }
                StatusCallback:       { type: string }
                StatusCallbackMethod: { type: string, default: "POST" }
      responses:
        '200':
          description: Stream started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stream' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Streams/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
      - $ref: '#/components/parameters/SubresourceSid'
    get:
      operationId: streams.fetch
      tags: [Api20100401Stream]
      summary: Fetch a single stream by sid
      responses:
        '200':
          description: Stream resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stream' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: streams.update
      tags: [Api20100401Stream]
      summary: Update a media stream — only Status=stopped is meaningful
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Status]
              properties:
                Status: { type: string, enum: [stopped] }
      responses:
        '200':
          description: Stream stopped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stream' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Siprec.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: siprec.list
      tags: [Api20100401Siprec]
      summary: List active SIPREC sessions for the call
      description: |
        Returns 0 or 1 entries — only one SIPREC mirror per call leg
        is supported. Pagination envelope is the Twilio-compatible
        shape.
      responses:
        '200':
          description: Page of SIPREC sessions (0 or 1 entry).
          content:
            application/json:
              schema:
                type: object
                required: [siprec, page, page_size, total]
                properties:
                  siprec: { type: array, items: { $ref: '#/components/schemas/SiprecSession' } }
                  page:              { type: integer }
                  page_size:         { type: integer }
                  num_pages:         { type: integer }
                  total:             { type: integer }
                  first_page_uri:    { type: string }
                  next_page_uri:     { type: [string, "null"] }
                  previous_page_uri: { type: [string, "null"] }
                  uri:               { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: siprec.create
      tags: [Api20100401Siprec]
      summary: Start a SIPREC session on the call (REST equivalent of `<Start><Siprec>`)
      description: |
        Starts a SIPREC mirror against the configured connector
        profile on the live call leg. Returns the new Siprec
        resource with an SR-prefixed sid.
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Name:                 { type: string }
                ConnectorName:        { type: string, description: "SIPREC profile name. Empty falls back to the configured default profile." }
                Track:                { type: string, enum: [inbound_track, outbound_track, both_tracks] }
                StatusCallback:       { type: string }
                StatusCallbackMethod: { type: string, default: "POST" }
      responses:
        '200':
          description: SIPREC session started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SiprecSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Siprec/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
      - $ref: '#/components/parameters/SubresourceSid'
    get:
      operationId: siprec.fetch
      tags: [Api20100401Siprec]
      summary: Fetch a single SIPREC session by sid
      responses:
        '200':
          description: SIPREC resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SiprecSession' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: siprec.update
      tags: [Api20100401Siprec]
      summary: Update a SIPREC session — clears tracking only
      description: |
        The SIPREC integration doesn't expose a stop verb; the SRS
        recording session continues until the call hangs up. This
        endpoint clears VoiceML's session-tracking entry only.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Status]
              properties:
                Status: { type: string, enum: [stopped] }
      responses:
        '200':
          description: Tracking cleared.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SiprecSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Transcriptions.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: transcriptions.list
      tags: [Api20100401CallTranscription]
      summary: List active transcriptions for the call
      description: |
        Returns 0 or 1 entries. Pagination envelope is the Twilio-compatible
        shape.
      responses:
        '200':
          description: Page of transcriptions (0 or 1 entry).
          content:
            application/json:
              schema:
                type: object
                required: [transcriptions, page, page_size, total]
                properties:
                  transcriptions: { type: array, items: { $ref: '#/components/schemas/CallTranscription' } }
                  page:              { type: integer }
                  page_size:         { type: integer }
                  num_pages:         { type: integer }
                  total:             { type: integer }
                  first_page_uri:    { type: string }
                  next_page_uri:     { type: [string, "null"] }
                  previous_page_uri: { type: [string, "null"] }
                  uri:               { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: transcriptions.create
      tags: [Api20100401CallTranscription]
      summary: Start real-time transcription on the call (REST equivalent of `<Start><Transcription>`)
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Name:                 { type: string }
                Track:                { type: string, enum: [inbound_track, outbound_track, both_tracks] }
                LanguageCode:         { type: string, default: "en-US" }
                TranscriptionEngine:  { type: string, enum: [deepgram, google, aws, azure] }
                ProfanityFilter:      { type: boolean }
                PartialResults:       { type: boolean }
                Hints:                { type: string }
                StatusCallback:       { type: string }
                StatusCallbackMethod: { type: string, default: "POST" }
                StatusCallbackEvents: { type: string, description: "Comma-separated event filter." }
      responses:
        '200':
          description: Transcription started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CallTranscription' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Transcriptions/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
      - $ref: '#/components/parameters/SubresourceSid'
    get:
      operationId: transcriptions.fetch
      tags: [Api20100401CallTranscription]
      summary: Fetch a single transcription by sid
      responses:
        '200':
          description: Transcription resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CallTranscription' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: transcriptions.update
      tags: [Api20100401CallTranscription]
      summary: Update a transcription — only Status=stopped is meaningful
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Status]
              properties:
                Status: { type: string, enum: [stopped] }
      responses:
        '200':
          description: Transcription stopped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CallTranscription' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Payments.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    post:
      operationId: payments.create
      tags: [Api20100401Payments]
      summary: Start a <Pay> session on an existing call (REST equivalent of `<Pay>` TwiML)
      description: |
        Initiates a PCI Pay session against the live call leg. Mirrors
        the TwiML `<Pay>` verb's parser + state machine; every
        attribute below is accepted and validated. The runtime
        (Stripe charge / tokenize) is currently gated; until it is
        wired, both surfaces accept and log without invoking the
        Stripe connector.

        Per-tenant BYO is binding: the tenant's account row must have
        `pay_enabled = true` AND `stripe_secret_key` set (admin
        opt-in). No server-level Stripe key fallback — multi-tenancy
        demands no fallback.

        `IdempotencyKey` is accepted and persisted on the row for
        diagnostic visibility; replay dedup is NOT enforced today.
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                IdempotencyKey:        { type: string, description: "Body-level dedup token. Accepted; replay dedup not enforced." }
                StatusCallback:        { type: string }
                BankAccountType:       { type: string, enum: [consumer-checking, consumer-savings, commercial-checking] }
                ChargeAmount:          { type: string, description: "Decimal under 1,000,000." }
                Currency:              { type: string, default: "USD" }
                Description:           { type: string }
                Input:                 { type: string, enum: [dtmf] }
                MinPostalCodeLength:   { type: integer, default: 0 }
                Parameter:             { type: string, description: "Single-level JSON object passed to the payment connector." }
                PaymentConnector:      { type: string, default: "Default" }
                PaymentMethod:         { type: string, enum: [credit-card, ach-debit] }
                PostalCode:            { type: boolean, default: true }
                SecurityCode:          { type: boolean, default: true }
                Timeout:               { type: integer, default: 5 }
                TokenType:             { type: string, enum: [one-time, reusable, payment-method], default: "one-time" }
                ValidCardTypes:        { type: string, description: "Space-separated. Default: visa mastercard amex maestro discover optima jcb diners-club enroute." }
                RequireMatchingInputs: { type: string, description: "Comma-separated fields requiring matcher inputs." }
                Confirmation:          { type: boolean }
      responses:
        '201':
          description: Payment session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CallPayment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Account is not pay_enabled or has no stripe_secret_key.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Payments/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
      - $ref: '#/components/parameters/SubresourceSid'
    post:
      operationId: payments.update
      tags: [Api20100401Payments]
      summary: Update a Pay session — Status=complete or Status=cancel
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                IdempotencyKey: { type: string }
                StatusCallback: { type: string }
                Capture:        { type: string, enum: [payment-card-number, expiration-date, security-code, postal-code, bank-routing-number, bank-account-number, payment-card-number-matcher, expiration-date-matcher, security-code-matcher, postal-code-matcher] }
                Status:         { type: string, enum: [complete, cancel] }
      responses:
        '202':
          description: Pay session update accepted; final settlement may still be pending.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CallPayment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Notifications.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: callNotifications.list
      tags: [Api20100401CallNotification]
      summary: List per-call notifications (compat stub)
      description: |
        Twilio's per-call alert log. VoiceML doesn't track
        notifications as a separate stream — relevant operator-side
        events flow through metrics + structured logs. This
        endpoint is mounted as a stub so SDK helpers don't 404;
        the response is always an empty list. Page/PageSize and Log
        are accepted for SDK ergonomics but have no effect on an
        empty list.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
        - name: Log
          in: query
          required: false
          schema: { type: integer, enum: [0, 1] }
          description: |
            Twilio-compatible parameter — 0 = error-level only, 1 =
            warning-level + above. Accepted for SDK migration
            compatibility; has no effect since VoiceML's per-call
            notification stream is unimplemented (this endpoint is a
            stub returning an empty list).
        - name: MessageDate
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Twilio-compatible date filter — accept-but-no-op on empty notification stub.
        - name: "MessageDate<"
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Twilio-compatible date filter — accept-but-no-op on empty notification stub.
        - name: "MessageDate>"
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Twilio-compatible date filter — accept-but-no-op on empty notification stub.
      responses:
        '200':
          description: Empty list (always — stub).
          content:
            application/json:
              schema:
                type: object
                required: [notifications, page, page_size, total, uri]
                properties:
                  notifications: { type: array, items: {} }
                  page:           { type: integer, enum: [0] }
                  page_size:      { type: integer }
                  total:          { type: integer, enum: [0] }
                  uri:            { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}/Notifications/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/CallSid'
