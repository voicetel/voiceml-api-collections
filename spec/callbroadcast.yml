        sip_domain_sid: { nullable: true, type: string, pattern: '^SD[0-9a-fA-F]{32}$' }
        date_created:   { nullable: true, type: string, format: date-time }
        date_updated:   { nullable: true, type: string, format: date-time }
        url:            { nullable: true, type: string, format: uri }

    VoiceV1SourceIpMappingList:
      type: object
      required: [source_ip_mappings, meta]
      properties:
        source_ip_mappings: { type: array, items: { $ref: '#/components/schemas/VoiceV1SourceIpMapping' } }
        meta:               { $ref: '#/components/schemas/VoiceV1Meta' }

    VoiceV1ByocTrunk:
      type: object
      required: [account_sid, sid, date_created, date_updated, url]
      properties:
        account_sid:            { nullable: true, type: string, pattern: '^AC[0-9a-fA-F]{32}$' }
        sid:                    { nullable: true, type: string, pattern: '^BY[0-9a-fA-F]{32}$', example: "BY0123456789abcdef0123456789abcdef" }
        friendly_name:          { nullable: true, type: string, example: "carrier-x" }
        voice_url:              { nullable: true, type: string, format: uri }
        voice_method:           { nullable: true, type: string, enum: [GET, POST] }
        voice_fallback_url:     { nullable: true, type: string, format: uri }
        voice_fallback_method:  { nullable: true, type: string, enum: [GET, POST] }
        status_callback_url:    { nullable: true, type: string, format: uri }
        status_callback_method: { nullable: true, type: string, enum: [GET, POST] }
        cnam_lookup_enabled:    { nullable: true, type: boolean }
        connection_policy_sid:  { nullable: true, type: string, pattern: '^NY[0-9a-fA-F]{32}$' }
        from_domain_sid:        { nullable: true, type: string, pattern: '^SD[0-9a-fA-F]{32}$' }
        date_created:           { nullable: true, type: string, format: date-time }
        date_updated:           { nullable: true, type: string, format: date-time }
        url:                    { nullable: true, type: string, format: uri }

    VoiceV1ByocTrunkList:
      type: object
      required: [byoc_trunks, meta]
      properties:
        byoc_trunks: { type: array, items: { $ref: '#/components/schemas/VoiceV1ByocTrunk' } }
        meta:        { $ref: '#/components/schemas/VoiceV1Meta' }

    VoiceV1ConnectionPolicy:
      type: object
      required: [account_sid, sid, date_created, date_updated, url, links]
      properties:
        account_sid:   { nullable: true, type: string, pattern: '^AC[0-9a-fA-F]{32}$' }
        sid:           { nullable: true, type: string, pattern: '^NY[0-9a-fA-F]{32}$', example: "NY0123456789abcdef0123456789abcdef" }
        friendly_name: { nullable: true, type: string, example: "origination-policy" }
        date_created:  { nullable: true, type: string, format: date-time }
        date_updated:  { nullable: true, type: string, format: date-time }
        url:           { nullable: true, type: string, format: uri }
        links:
          type: object
          nullable: true
          additionalProperties: { type: string }

    VoiceV1ConnectionPolicyList:
      type: object
      required: [connection_policies, meta]
      properties:
        connection_policies: { type: array, items: { $ref: '#/components/schemas/VoiceV1ConnectionPolicy' } }
        meta:                { $ref: '#/components/schemas/VoiceV1Meta' }

    VoiceV1ConnectionPolicyTarget:
      type: object
      required: [account_sid, connection_policy_sid, sid, target, priority, weight, date_created, date_updated, url]
      properties:
        account_sid:           { nullable: true, type: string, pattern: '^AC[0-9a-fA-F]{32}$' }
        connection_policy_sid: { nullable: true, type: string, pattern: '^NY[0-9a-fA-F]{32}$' }
        sid:                   { nullable: true, type: string, pattern: '^NE[0-9a-fA-F]{32}$', example: "NE0123456789abcdef0123456789abcdef" }
        friendly_name:         { nullable: true, type: string }
        target:                { nullable: true, type: string, format: uri, example: "sip:edge@example.com" }
        priority:              { type: integer, example: 10 }
        weight:                { type: integer, example: 10 }
        enabled:               { nullable: true, type: boolean }
        date_created:          { nullable: true, type: string, format: date-time }
        date_updated:          { nullable: true, type: string, format: date-time }
        url:                   { nullable: true, type: string, format: uri }

    VoiceV1ConnectionPolicyTargetList:
      type: object
      required: [targets, meta]
      properties:
        targets: { type: array, items: { $ref: '#/components/schemas/VoiceV1ConnectionPolicyTarget' } }
        meta:    { $ref: '#/components/schemas/VoiceV1Meta' }

    VoiceV1DialingPermissionsSettings:
      type: object
      required: [dialing_permissions_inheritance, url]
      properties:
        dialing_permissions_inheritance: { nullable: true, type: boolean }
        url:                             { nullable: true, type: string, format: uri }

  responses:
    Unauthorized:
      description: |
        Authentication failed. All of the following return the same 401
        with the same body, intentionally indistinguishable from outside:
          * Unknown :AccountSid
          * Disabled account
          * Wrong api_key
          * Source IP not in the account's allow_cidr (per-tenant allowlist)
      headers:
        WWW-Authenticate:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Request validation failed (invalid phone number, malformed body, ...).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Per-account rate limit exceeded.
      headers:
        Retry-After:        { schema: { type: integer } }
        X-RateLimit-Limit:  { schema: { type: integer } }
        X-RateLimit-Remaining: { schema: { type: integer } }
        X-RateLimit-Reset:  { schema: { type: integer } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalServerError:
      description: |
        Unexpected internal error (Twilio code 20500). Emitted when a
        backing store or subsystem operation fails. The body is the
        standard Error envelope with a sanitized constant message.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

paths:
  /2010-04-01/Accounts/{AccountSid}/Calls.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: calls.list
      tags: [Api20100401Call]
      summary: List calls
      description: |
        Paginated list of call records for the given account. Filters
        match Twilio: `To`, `From`, `Status`, `ParentCallSid`,
        `StartTime` (bare = full UTC day), `StartTime<` (strict upper),
        `StartTime>` (strict lower), and the same triple for `EndTime`.
        For backwards compatibility the legacy `StartTime>=` / `EndTime<=`
        SQL-style operators are also accepted at the handler. Pagination
        via `Page` and `PageSize` (max 1000). `EndTime` filters
        restrict the result set to terminal-status rows (an in-progress
        call has no end time and cannot match an EndTime window).
      parameters:
        - { name: To,            in: query, schema: { type: string } }
        - { name: From,          in: query, schema: { type: string } }
        - { name: Status,        in: query, schema: { type: string } }
        - { name: ParentCallSid, in: query, schema: { type: string } }
        - { name: StartTime,     in: query, schema: { type: string, format: date-time }, description: "Calls started on this UTC date (YYYY-MM-DD)." }
        - { name: "StartTime<",  in: query, schema: { type: string, format: date-time }, description: "Calls started strictly before this UTC date/time." }
        - { name: "StartTime>",  in: query, schema: { type: string, format: date-time }, description: "Calls started strictly after this UTC date/time." }
        - { name: EndTime,       in: query, schema: { type: string, format: date-time }, description: "Calls ended on this UTC date (YYYY-MM-DD)." }
        - { name: "EndTime<",    in: query, schema: { type: string, format: date-time }, description: "Calls ended strictly before this UTC date/time." }
        - { name: "EndTime>",    in: query, schema: { type: string, format: date-time }, description: "Calls ended strictly after this UTC date/time." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of calls.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CallList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: calls.create
      tags: [Api20100401Call]
      summary: Create (originate) a call
      description: |
        Originates an outbound call. The `To` and `From`
        numbers are validated and normalised to E.164 against the
        authenticated tenant's `phone_regions` list — set per-account in
        the admin API. Empty list disables validation; multi-region
        tenants accept numbers valid in any listed region.
        `MachineDetection` is optional; omitting it skips AMD entirely.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: { $ref: '#/components/schemas/CreateCallRequest' }
          application/json:
            schema: { $ref: '#/components/schemas/CreateCallRequest' }
      responses:
        '201':
          description: Call created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Call' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '502':
          description: Originate failed (carrier unreachable, internal error, ...).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Calls/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: calls.fetch
      tags: [Api20100401Call]
      summary: Fetch a call
      responses:
        '200':
          description: Call resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Call' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: calls.update
      tags: [Api20100401Call]
      summary: Update or terminate a live call
      description: |
        Three flows on the same endpoint (mirrors Twilio):
          * `Status=completed|canceled` — terminate the call.
          * `Twiml=<inline>` — execute inline TwiML on the live call
            (wins over `Url` when both are present).
          * `Url=…` — fetch new TwiML and execute it on the live call
            (live redirect / hot swap).
        If `Status` is present alongside any TwiML source, `Status`
        wins. The success response is the full Call resource — same
        shape `GET` returns — so SDK deserialisers round-trip.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: { $ref: '#/components/schemas/UpdateCallRequest' }
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCallRequest' }
      responses:
        '200':
          description: Update applied. Full Call resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Call' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '502':
          description: TwiML fetch / execute failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      operationId: calls.delete
      tags: [Api20100401Call]
      summary: Delete a call record
      responses:
        '204':
          description: Call deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Conferences.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    get:
      operationId: conferences.list
      tags: [Api20100401Conference]
      summary: List active conferences for the account
      description: |
        Returns conferences currently active for this tenant. Live
        query — no caching, always reflects state at request time.
        Conferences appear once a first participant joins (typically
        via TwiML `<Dial><Conference>`) and disappear as soon as the
        last participant leaves.
      parameters:
        - { name: FriendlyName, in: query, schema: { type: string }, description: "Filter to conferences with this exact FriendlyName." }
        - { name: Status, in: query, schema: { type: string, enum: [init, in-progress, completed] }, description: "Filter to conferences in this lifecycle state. VoiceML conferences are only ever `in-progress` (rooms vanish when the last participant leaves), so filtering by `init` or `completed` returns an empty list." }
        - { name: DateCreated, in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible parameter. VoiceML's conference list is a live query with no historical store — accepted but does not narrow the result set." }
        - { name: "DateCreated<", in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - { name: "DateCreated>", in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - { name: DateUpdated, in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - { name: "DateUpdated<", in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - { name: "DateUpdated>", in: query, schema: { type: string, format: date-time }, description: "Twilio-compatible date filter — accept-but-no-op on live conference list." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of conferences.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConferenceList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Conference subsystem not configured (passive AMD-on-fork mode).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Conferences/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: conferences.fetch
      tags: [Api20100401Conference]
      summary: Fetch a single conference
      responses:
        '200':
          description: Conference resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conference' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: conferences.update
      tags: [Api20100401Conference]
      summary: End an active conference
      description: |
        v1 supports only `Status=completed` — kicks every participant
        and tears down the room. Twilio's other update fields
        (`Announce*`) are not yet implemented.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [Status]
              properties:
                Status: { type: string, enum: [completed] }
      responses:
        '200':
          description: Conference ended (synthesised post-end view).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conference' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Conference subsystem not configured (passive AMD-on-fork mode).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Conferences/{ConferenceSid}/Participants.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ConferenceSid'
    get:
      operationId: participants.list
      tags: [Api20100401Participant]
      summary: List participants in a conference
      parameters:
        - { name: Muted,    in: query, schema: { type: boolean }, description: "Filter to participants with this Muted state." }
        - { name: Hold,     in: query, schema: { type: boolean }, description: "Filter to participants with this Hold state." }
        - { name: Coaching, in: query, schema: { type: boolean }, description: "Filter to participants with this Coaching state." }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of participants.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParticipantList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: participants.create
      tags: [Api20100401Participant]
      summary: Dial a participant into a conference
      description: |
        Places an outbound call from `From` to `To` that joins the named
        conference on answer via inline TwiML. Returns immediately with
        `status=queued` while the leg is ringing.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [From, To]
              properties:
                From: { type: string, description: "Caller ID / originating endpoint (E.164 or Twilio client:/sip:/app: form)." }
                To:   { type: string, description: "Destination endpoint to dial into the conference." }
                Label: { type: string }
                Muted: { type: boolean }
                StartConferenceOnEnter: { type: boolean, default: true }
                EndConferenceOnExit: { type: boolean, default: false }
                Timeout: { type: integer, description: "Ring timeout in seconds (default 60)." }
                StatusCallback: { type: string, format: uri }
                StatusCallbackMethod: { type: string, enum: [GET, POST] }
                StatusCallbackEvent: { type: string }
      responses:
        '201':
          description: Participant resource (queued while dialing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502':
          description: Outbound originate dispatch failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Conference or outbound dial subsystem not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Conferences/{ConferenceSid}/Participants/{CallSid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ConferenceSid'
      - $ref: '#/components/parameters/CallSid'
    get:
      operationId: participants.fetch
      tags: [Api20100401Participant]
      summary: Fetch a single participant
      responses:
        '200':
          description: Participant resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: participants.update
      tags: [Api20100401Participant]
      summary: Mute / unmute / hold a participant
      description: |
        At least one of `Muted` or `Hold` must be set. Twilio's
        `HoldUrl` (custom hold-music URL) and `AnnounceUrl` are
        not yet implemented.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                Muted: { type: boolean, description: "Mute / unmute the participant." }
                Hold:  { type: boolean, description: "Place the participant on hold (default hold-music profile) or remove from hold." }
      responses:
        '200':
          description: Participant resource (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Participant' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    delete:
      operationId: participants.delete
      tags: [Api20100401Participant]
      summary: Kick a participant out of the conference
      responses:
        '204':
          description: Participant kicked.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /2010-04-01/Accounts/{AccountSid}/Queues.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
    post:
      operationId: queues.create
      tags: [Api20100401Queue]
      summary: Create a queue
      description: |
        Create a named queue. Idempotent — POSTing the same
        FriendlyName a second time returns the existing queue rather
        than erroring (matches Twilio).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [FriendlyName]
              properties:
                FriendlyName: { type: string, maxLength: 64 }
                MaxSize:      { type: integer, default: 0, minimum: 0 }
      responses:
        '201':
          description: Queue resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Queue' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Queue subsystem not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      operationId: queues.list
      tags: [Api20100401Queue]
      summary: List queues for the account (paged, FriendlyName ASC)
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: Page of queues.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /2010-04-01/Accounts/{AccountSid}/Queues/{Sid}.json:
    parameters:
      - $ref: '#/components/parameters/AccountSid'
      - $ref: '#/components/parameters/ResourceSid'
    get:
      operationId: queues.fetch
      tags: [Api20100401Queue]
      summary: Fetch a queue
      responses:
        '200':
          description: Queue resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Queue' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    post:
      operationId: queues.update
      tags: [Api20100401Queue]
      summary: Update a queue (FriendlyName / MaxSize)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                FriendlyName: { type: string, maxLength: 64 }
                MaxSize:      { type: integer, minimum: 0 }
      responses:
        '200':
          description: Queue resource (post-mutation state).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Queue' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: queues.delete
      tags: [Api20100401Queue]
      summary: Delete a queue
      description: |
        Refused with 409 if any members are still waiting — caller must
        drain the queue first (matches Twilio's behaviour).
      responses:
        '204':
