        - { name: "DateCreated<", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly before this UTC date." }
        - { name: "DateCreated>", in: query, schema: { type: string, format: date-time }, description: "Filter to recordings created strictly after this UTC date." }
