name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: JSON-lint Postman collection
        run: jq empty < voiceml-api.postman_collection.json

      - name: JSON-lint Postman environment
        run: jq empty < voiceml-api.postman_environment.json

      - name: JSON-lint bruno.json
        run: jq empty < bruno/bruno.json

      - name: Validate operation coverage
        run: node scripts/validate.mjs
